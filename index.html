<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BETAGS - Poisson Pro</title>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-card: #151921;
            --primary: #4dabf7;
            --accent-green: #51cf66;
            --accent-red: #ff6b6b;
            --accent-yellow: #fcc419;
            --text-white: #e9ecef;
            --text-muted: #adb5bd;
            --border: #2c3440;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-white);
            margin: 0;
            padding: 0;
            display: flex; 
            justify-content: center;
            min-height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 600px; 
            padding: 20px; 
            box-sizing: border-box;
        }

        h1 { font-size: 1.6rem; color: var(--primary); text-align: center; margin: 25px 0; letter-spacing: 4px; font-weight: 900; }
        h1 span { color: var(--text-white); }

        .section-title { 
            font-size: 0.75rem; 
            color: var(--primary); 
            text-transform: uppercase; 
            margin: 20px 0 12px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-weight: 800; 
            letter-spacing: 1px;
        }
        
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .input-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }

        .full-width { grid-column: span 2; }
        
        label {
            display: block;
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: bold;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            background: #0b0e14;
            color: white;
            font-size: 0.9rem;
            outline: none;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--primary); }

        .btn-analyze {
            width: 100%;
            background: linear-gradient(135deg, #4dabf7, #228be6);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(34, 139, 230, 0.4);
        }

        .btn-analyze:active { transform: scale(0.98); }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        .result-box {
            background: var(--glass);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .res-label { font-size: 0.6rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase; }
        .res-val { font-size: 1.2rem; font-weight: 900; margin: 5px 0; color: var(--accent-yellow); }
        .res-prob { font-size: 0.7rem; color: var(--primary); font-family: monospace; }

        .header-match {
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .prediction-summary {
            margin-top: 15px;
            padding: 10px;
            background: rgba(77, 171, 247, 0.1);
            border-radius: 8px;
            font-size: 0.8rem;
            text-align: center;
            border-left: 4px solid var(--primary);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>BETA<span>GS</span> POISSON</h1>

    <div class="section-title"><span>📝</span> DATOS DEL EQUIPO LOCAL</div>
    <div class="card">
        <div class="input-grid">
            <div class="full-width">
                <label>NOMBRE DE LA LIGA</label>
                <input type="text" id="leagueName" placeholder="Ej: Premier League">
            </div>
            <div>
                <label>EQUIPO LOCAL</label>
                <input type="text" id="homeTeam" placeholder="Nombre Local">
            </div>
            <div>
                <label>AVG GOLES A FAVOR (L)</label>
                <input type="number" id="avgGF_Local" step="0.01" placeholder="Ej: 1.85">
            </div>
            <div>
                <label>AVG GOLES EN CONTRA (L)</label>
                <input type="number" id="avgGC_Local" step="0.01" placeholder="Ej: 0.90">
            </div>
            <div>
                <label>AVG GOLES LIGA (LOCALES)</label>
                <input type="number" id="avgGLiga_Local" step="0.01" placeholder="Ej: 1.50">
            </div>
        </div>
    </div>

    <div class="section-title"><span>📝</span> DATOS DEL EQUIPO VISITA</div>
    <div class="card">
        <div class="input-grid">
            <div>
                <label>EQUIPO VISITA</label>
                <input type="text" id="awayTeam" placeholder="Nombre Visita">
            </div>
            <div>
                <label>AVG GOLES A FAVOR (V)</label>
                <input type="number" id="avgGF_Visita" step="0.01" placeholder="Ej: 1.20">
            </div>
            <div>
                <label>AVG GOLES EN CONTRA (V)</label>
                <input type="number" id="avgGC_Visita" step="0.01" placeholder="Ej: 1.60">
            </div>
            <div>
                <label>AVG GOLES LIGA (VISITAS)</label>
                <input type="number" id="avgGLiga_Visita" step="0.01" placeholder="Ej: 1.10">
            </div>
        </div>
        
        <button class="btn-analyze" onclick="calcularPoisson()">🚀 CALCULAR PROBABILIDADES</button>
    </div>

    <div id="resultsPanel" style="display: none;">
        <div class="section-title"><span>📊</span> RESULTADOS DEL ANÁLISIS</div>
        <div class="card">
            <div class="header-match">
                <div id="resLeague" style="font-size: 0.7rem; color: var(--primary); font-weight: 800;"></div>
                <div id="resMatch" style="font-size: 1.1rem; font-weight: 900; margin-top: 5px;"></div>
                <div id="expectedGoals" style="font-size: 0.8rem; color: var(--accent-yellow); margin-top: 5px;"></div>
            </div>

            <div class="results-grid">
                <div class="result-box">
                    <div class="res-label">Victoria Local (1)</div>
                    <div class="res-val" id="winH_val">0%</div>
                    <div class="res-prob" id="winH_odd">1.00</div>
                </div>
                <div class="result-box">
                    <div class="res-label">Empate (X)</div>
                    <div class="res-val" id="draw_val">0%</div>
                    <div class="res-prob" id="draw_odd">1.00</div>
                </div>
                <div class="result-box">
                    <div class="res-label">Victoria Visita (2)</div>
                    <div class="res-val" id="winA_val">0%</div>
                    <div class="res-prob" id="winA_odd">1.00</div>
                </div>
                <div class="result-box">
                    <div class="res-label">Over 2.5 FT</div>
                    <div class="res-val" id="ov25_val">0%</div>
                    <div class="res-prob" id="ov25_odd">1.00</div>
                </div>
                <div class="result-box">
                    <div class="res-label">Under 2.5 FT</div>
                    <div class="res-val" id="un25_val">0%</div>
                    <div class="res-prob" id="un25_odd">1.00</div>
                </div>
                <div class="result-box">
                    <div class="res-label">BTTS YES</div>
                    <div class="res-val" id="bttsY_val">0%</div>
                    <div class="res-prob" id="bttsY_odd">1.00</div>
                </div>
            </div>

            <div class="prediction-summary" id="predictionText">
                Cargando predicción...
            </div>
        </div>
    </div>
</div>

<script>
    function factorial(n) {
        if (n === 0 || n === 1) return 1;
        let r = 1;
        for (let i = 2; i <= n; i++) r *= i;
        return r;
    }

    function poisson(k, lambda) {
        return (Math.exp(-lambda) * Math.pow(lambda, k)) / factorial(k);
    }

    function calcularPoisson() {
        // Datos Equipos
        const league = document.getElementById('leagueName').value || "LIGA";
        const home = document.getElementById('homeTeam').value || "LOCAL";
        const away = document.getElementById('awayTeam').value || "VISITA";
        
        // Datos Local
        const gfL = parseFloat(document.getElementById('avgGF_Local').value);
        const gcL = parseFloat(document.getElementById('avgGC_Local').value);
        const alL = parseFloat(document.getElementById('avgGLiga_Local').value);
        
        // Datos Visita
        const gfV = parseFloat(document.getElementById('avgGF_Visita').value);
        const gcV = parseFloat(document.getElementById('avgGC_Visita').value);
        const alV = parseFloat(document.getElementById('avgGLiga_Visita').value);

        if ([gfL, gcL, alL, gfV, gcV, alV].some(isNaN)) {
            alert("Por favor completa todos los campos numéricos.");
            return;
        }

        // LÓGICA SOLICITADA:
        // Lambda Local = GF Local * GC Visita * Avg Liga Local
        // Lambda Visita = GF Visita * GC Local * Avg Liga Visita
        const lambdaL = gfL * gcV * alL;
        const lambdaV = gfV * gcL * alV;

        // Distribución de probabilidades (0 a 10 goles para precisión)
        let probL = [];
        let probV = [];
        for (let i = 0; i <= 10; i++) {
            probL[i] = poisson(i, lambdaL);
            probV[i] = poisson(i, lambdaV);
        }

        // Matriz 1X2 y Totales
        let pWinH = 0;
        let pDraw = 0;
        let pWinA = 0;
        let pUnder25 = 0;

        for (let i = 0; i <= 10; i++) {
            for (let j = 0; j <= 10; j++) {
                let pResult = probL[i] * probV[j];
                
                // 1X2
                if (i > j) pWinH += pResult;
                else if (i === j) pDraw += pResult;
                else pWinA += pResult;

                // Over/Under
                if (i + j <= 2) pUnder25 += pResult;
            }
        }

        const pOver25 = 1 - pUnder25;

        // BTTS
        const pL0 = probL[0];
        const pV0 = probV[0];
        const pBTTS_No = (pL0 + pV0) - (pL0 * pV0);
        const pBTTS_Yes = 1 - pBTTS_No;

        // Mostrar Resultados
        document.getElementById('resLeague').innerText = league.toUpperCase();
        document.getElementById('resMatch').innerText = `${home} vs ${away}`;
        document.getElementById('expectedGoals').innerText = `Exp. Goals: ${(lambdaL + lambdaV).toFixed(2)}`;

        updateResult('winH', pWinH);
        updateResult('draw', pDraw);
        updateResult('winA', pWinA);
        updateResult('ov25', pOver25);
        updateResult('un25', pUnder25);
        updateResult('bttsY', pBTTS_Yes);

        // Resumen Predictivo
        let pred = "";
        if (pOver25 > 0.55) pred = "Tendencia: Alta probabilidad de goles (Over).";
        else if (pUnder25 > 0.55) pred = "Tendencia: Partido cerrado (Under).";
        else pred = "Tendencia: Marcador equilibrado.";
        
        document.getElementById('predictionText').innerText = pred;
        document.getElementById('resultsPanel').style.display = 'block';
        
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function updateResult(id, prob) {
        const percent = (prob * 100).toFixed(1) + '%';
        const odd = prob > 0.01 ? (1 / prob).toFixed(2) : "100+";
        document.getElementById(id + '_val').innerText = percent;
        document.getElementById(id + '_odd').innerText = 'CUOTA: ' + odd;
    }
</script>

</body>
</html>
