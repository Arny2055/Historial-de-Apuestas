<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APUESTASYSTEM - Dashboard CARTOON</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@400;700&display=swap');

        :root {
            --primary: #FFD700; /* Amarillo vibrante */
            --accent: #FF5722;  /* Naranja cómico */
            --success: #00E676; /* Verde neón */
            --danger: #FF1744;  /* Rojo intenso */
            --light: #F0F4F8;
            --dark: #212121;
            --border-width: 3px;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #81D4FA; /* Azul cielo tipo dibujo animado */
            background-image: radial-gradient(#4fc3f7 2px, transparent 2px);
            background-size: 30px 30px;
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            max-width: 1400px;
            margin: auto;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Bangers', cursive;
            font-size: 4rem;
            margin: 0;
            color: white;
            text-shadow: 4px 4px 0px var(--dark);
            letter-spacing: 4px;
            -webkit-text-stroke: 2px var(--dark);
        }

        /* Dashboard Stats - Estilo Burbuja */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border: var(--border-width) solid var(--dark);
            border-radius: 15px;
            box-shadow: 8px 8px 0px var(--dark);
            text-align: center;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px var(--dark);
        }

        .stat-card h3 {
            margin: 0;
            font-family: 'Bangers', cursive;
            font-size: 1.2rem;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .stat-card p {
            margin: 10px 0 0;
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--dark);
        }

        /* Tables - Estilo Pop Art */
        .table-container {
            background: white;
            padding: 25px;
            border: var(--border-width) solid var(--dark);
            border-radius: 20px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            min-width: 1100px;
        }

        th {
            background-color: var(--primary);
            color: var(--dark);
            padding: 15px;
            text-align: left;
            font-family: 'Bangers', cursive;
            font-size: 1.1rem;
            border: var(--border-width) solid var(--dark);
        }

        td {
            padding: 12px;
            border: 2px solid var(--dark);
            font-weight: 700;
            background: white;
        }

        tr:nth-child(even) td {
            background-color: #FFFDE7;
        }

        /* Result Colors */
        .res-w { background-color: var(--success) !important; color: var(--dark); }
        .res-l { background-color: var(--danger) !important; color: white; }
        .res-v { background-color: #FFEA00 !important; color: var(--dark); }

        /* Formulario - Estilo Panel de Cómic */
        .add-bet-form {
            background: #FFF9C4;
            padding: 30px;
            border: var(--border-width) solid var(--dark);
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
            box-shadow: 8px 8px 0px var(--dark);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-family: 'Bangers', cursive;
            font-size: 1.1rem;
            color: var(--dark);
        }

        input, select {
            padding: 12px;
            border: var(--border-width) solid var(--dark);
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 4px 4px 0px #ccc;
        }

        /* Botones */
        .btn {
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Bangers', cursive;
            font-size: 1.3rem;
            border: var(--border-width) solid var(--dark);
            transition: 0.1s;
            box-shadow: 4px 4px 0px var(--dark);
            text-transform: uppercase;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--dark);
        }

        .btn-add { background: var(--success); color: var(--dark); }
        .btn-export { background: var(--accent); color: white; }
        .btn-delete { 
            background: #fff; 
            color: var(--danger); 
            padding: 5px 12px; 
            font-size: 1rem; 
        }
        
        .select-edit {
            padding: 5px;
            border: 2px solid var(--dark);
            border-radius: 5px;
            font-weight: 900;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h1>ApuestaSystem!</h1>
        <button class="btn btn-export" onclick="exportData()">💾 Exportar</button>
    </div>

    <div class="dashboard-grid">
        <div class="stat-card" style="background: #E3F2FD;">
            <h3>Bank Actual</h3>
            <p id="stat-bank">1.000,00 €</p>
        </div>
        <div class="stat-card">
            <h3>Apostado</h3>
            <p id="stat-invested">0,00 €</p>
        </div>
        <div class="stat-card">
            <h3>Apuestas</h3>
            <p id="stat-count">0</p>
        </div>
        <div class="stat-card">
            <h3>Cuota Media</h3>
            <p id="stat-odds">0,00</p>
        </div>
        <div class="stat-card" style="background: var(--success);">
            <h3>B. Neto</h3>
            <p id="stat-profit">0,00 €</p>
        </div>
        <div class="stat-card" style="background: var(--primary);">
            <h3>Yield</h3>
            <p id="stat-yield">0%</p>
        </div>
        <div class="stat-card">
            <h3>Win Rate</h3>
            <p id="stat-wr">0%</p>
        </div>
    </div>

    <div class="add-bet-form">
        <div class="input-group">
            <label>Partido</label>
            <input type="text" id="in-match" placeholder="¿Quién juega?">
        </div>
        <div class="input-group">
            <label>Mercado</label>
            <input type="text" id="in-market" placeholder="Goles, 1X2...">
        </div>
        <div class="input-group">
            <label>Apuesta</label>
            <input type="text" id="in-bet-type" placeholder="Tu pronóstico">
        </div>
        <div class="input-group">
            <label>Stake %</label>
            <input type="number" id="in-stake" step="0.1" value="1">
        </div>
        <div class="input-group">
            <label>Cuota</label>
            <input type="number" id="in-odds" step="0.01" value="1.80">
        </div>
        <div class="input-group">
            <label>Resultado</label>
            <select id="in-res">
                <option value="PENDING">⌛ Pendiente</option>
                <option value="W">✅ Ganada (W)</option>
                <option value="L">❌ Perdida (L)</option>
                <option value="V">⚪ Nula (V)</option>
            </select>
        </div>
        <button class="btn btn-add" onclick="addBet()">BOOM! Añadir</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>FECHA</th>
                    <th>ID</th>
                    <th>PARTIDO</th>
                    <th>MERCADO</th>
                    <th>APUESTA</th>
                    <th>BANK</th>
                    <th>STAKE</th>
                    <th>€ INVERTIDO</th>
                    <th>CUOTA</th>
                    <th>POTENCIAL</th>
                    <th>UNIDADES</th>
                    <th>B. NETO</th>
                    <th>RESULTADO</th>
                    <th>ELIMINAR</th>
                </tr>
            </thead>
            <tbody id="bet-table-body">
            </tbody>
        </table>
    </div>
</div>

<script>
    let initialBank = 1000.00;
    let bets = JSON.parse(localStorage.getItem('apuestaSystemData')) || [
        { fecha: '7/4/2026', id: 1, partido: 'M. Liberia - San Carlos', mercado: 'Goles', apuesta: 'BTTs Yes', bankAtTime: 1000, stake: 1, cuota: 1.95, resultado: 'W' },
        { fecha: '7/4/2026', id: 2, partido: 'Sporting CP - Arsenal', mercado: 'Goles', apuesta: 'BTTs Yes', bankAtTime: 1000, stake: 1, cuota: 1.80, resultado: 'PENDING' }
    ];

    function calculateStats() {
        let totalInvested = 0;
        let totalProfit = 0;
        let won = 0;
        let totalSettled = 0;
        let oddsSum = 0;

        const tableBody = document.getElementById('bet-table-body');
        tableBody.innerHTML = '';

        bets.forEach((bet, index) => {
            let amount = (bet.bankAtTime * (bet.stake / 100)); 
            let potential = amount * bet.cuota;
            let units = 0; 
            let netProfit = 0;
            let resClass = '';

            if (bet.resultado === 'W') {
                netProfit = potential - amount;
                units = (bet.cuota - 1) * bet.stake;
                won++;
                totalSettled++;
                resClass = 'res-w';
            } else if (bet.resultado === 'L') {
                netProfit = -amount;
                units = -bet.stake;
                totalSettled++;
                resClass = 'res-l';
            } else if (bet.resultado === 'V') {
                netProfit = 0;
                units = 0;
                totalSettled++;
                resClass = 'res-v';
            }

            totalInvested += amount;
            totalProfit += netProfit;
            oddsSum += bet.cuota;

            tableBody.innerHTML += `
                <tr>
                    <td>${bet.fecha}</td>
                    <td>${bet.id || index + 1}</td>
                    <td>${bet.partido}</td>
                    <td>${bet.mercado || '-'}</td>
                    <td>${bet.apuesta || '-'}</td>
                    <td>${bet.bankAtTime.toFixed(2)} €</td>
                    <td>${bet.stake}%</td>
                    <td>${amount.toFixed(2)} €</td>
                    <td>${bet.cuota.toFixed(2)}</td>
                    <td>${potential.toFixed(2)} €</td>
                    <td>${units.toFixed(2)}</td>
                    <td class="${resClass}">${netProfit.toFixed(2)} €</td>
                    <td class="${resClass}">
                        <select class="select-edit" onchange="updateResult(${index}, this.value)">
                            <option value="PENDING" ${bet.resultado === 'PENDING' ? 'selected' : ''}>PENDIENTE</option>
                            <option value="W" ${bet.resultado === 'W' ? 'selected' : ''}>WIN</option>
                            <option value="L" ${bet.resultado === 'L' ? 'selected' : ''}>LOSS</option>
                            <option value="V" ${bet.resultado === 'V' ? 'selected' : ''}>VOID</option>
                        </select>
                    </td>
                    <td>
                        <button class="btn btn-delete" onclick="deleteBet(${index})">Eliminar</button>
                    </td>
                </tr>
            `;
        });

        localStorage.setItem('apuestaSystemData', JSON.stringify(bets));

        document.getElementById('stat-bank').innerText = `${(initialBank + totalProfit).toFixed(2)} €`;
        document.getElementById('stat-invested').innerText = `${totalInvested.toFixed(2)} €`;
        document.getElementById('stat-count').innerText = bets.length;
        document.getElementById('stat-odds').innerText = bets.length > 0 ? (oddsSum / bets.length).toFixed(2) : "0.00";
        document.getElementById('stat-profit').innerText = `${totalProfit.toFixed(2)} €`;
        
        let yieldVal = totalInvested > 0 ? (totalProfit / totalInvested) * 100 : 0;
        document.getElementById('stat-yield').innerText = `${yieldVal.toFixed(2)}%`;

        let wr = totalSettled > 0 ? (won / totalSettled) * 100 : 0;
        document.getElementById('stat-wr').innerText = `${wr.toFixed(0)}%`;
    }

    function addBet() {
        const match = document.getElementById('in-match').value;
        const market = document.getElementById('in-market').value;
        const betType = document.getElementById('in-bet-type').value;
        const stake = parseFloat(document.getElementById('in-stake').value);
        const odds = parseFloat(document.getElementById('in-odds').value);
        const res = document.getElementById('in-res').value;

        if(!match || isNaN(stake) || isNaN(odds)) return alert("¡Ey! Falta información importante");

        let currentProfit = bets.reduce((acc, b) => {
            let amt = (b.bankAtTime * (b.stake / 100));
            if (b.resultado === 'W') return acc + (amt * b.cuota - amt);
            if (b.resultado === 'L') return acc - amt;
            return acc;
        }, 0);

        const newBet = {
            fecha: new Date().toLocaleDateString(),
            id: bets.length + 1,
            partido: match,
            mercado: market,
            apuesta: betType,
            bankAtTime: initialBank + currentProfit,
            stake: stake,
            cuota: odds,
            resultado: res
        };

        bets.push(newBet);
        calculateStats();
        
        document.getElementById('in-match').value = '';
        document.getElementById('in-market').value = '';
        document.getElementById('in-bet-type').value = '';
    }

    function deleteBet(index) {
        if(confirm("¿Estás seguro de querer borrar este pronóstico?")) {
            bets.splice(index, 1);
            calculateStats();
        }
    }

    function updateResult(index, newRes) {
        bets[index].resultado = newRes;
        calculateStats();
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(bets));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "apuestas_cartoon.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    calculateStats();
</script>

</body>
</html>
