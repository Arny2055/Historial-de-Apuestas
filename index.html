<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Poisson Pro - xG & Delta Adjusted</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #00adb5;
            --border-color: #333;
            --input-bg: #2d2d2d;
            --success: #00ff88;
            --warning: #ffcc00;
            --danger: #ff4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        h1 { text-align: center; color: var(--accent-color); margin-bottom: 10px; }
        .subtitle { text-align: center; font-size: 0.9em; color: #888; margin-bottom: 30px; }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #aaa; }

        input {
            width: 100%;
            padding: 10px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            transition: 0.3s;
        }

        button:hover { background: #008c95; }

        .delta-box {
            font-size: 1.5em;
            text-align: center;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            background: #252525;
            font-weight: bold;
        }

        .val-badge {
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8em;
        }

        .adjustment-info {
            font-size: 0.75em;
            color: var(--accent-color);
            text-align: center;
            margin-top: 5px;
            font-style: italic;
        }

        .suggestion-box {
            margin-top: 15px;
            padding: 15px;
            background: #252525;
            border-radius: 5px;
            text-align: center;
            border-left: 4px solid var(--accent-color);
        }
        
        .suggestion-title {
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚽ Poisson Pro: Delta & Rendimiento</h1>
    <p class="subtitle">Análisis dinámico de sobre/subrendimiento</p>

    <div class="grid-inputs">
        <div class="card">
            <h3>Local</h3>
            <div class="input-group">
                <label>xG Proyectado (Actual)</label>
                <input type="number" id="xgLocal" step="0.01" placeholder="Ej: 1.65">
            </div>
            <div class="input-group">
                <label>Promedio GF Histórico</label>
                <input type="number" id="gfLocal" step="0.01" placeholder="Ej: 1.40">
            </div>
            <div id="deltaLocal" class="delta-box">-</div>
            <div id="adjLocal" class="adjustment-info"></div>
        </div>

        <div class="card">
            <h3>Visitante</h3>
            <div class="input-group">
                <label>xG Proyectado (Actual)</label>
                <input type="number" id="xgVisit" step="0.01" placeholder="Ej: 1.20">
            </div>
            <div class="input-group">
                <label>Promedio GF Histórico</label>
                <input type="number" id="gfVisit" step="0.01" placeholder="Ej: 1.10">
            </div>
            <div id="deltaVisit" class="delta-box">-</div>
            <div id="adjVisit" class="adjustment-info"></div>
        </div>
    </div>

    <div class="card" style="margin-bottom: 20px;">
        <h3>Datos de Apuesta (Pick)</h3>
        <div class="grid-inputs" style="margin-bottom: 0;">
            <input type="number" id="marketOdd" step="0.01" placeholder="Cuota del Mercado">
        </div>
        <div id="marketSuggestion" class="suggestion-box" style="display:none;"></div>
    </div>

    <button onclick="calculateAll()">ANALIZAR PARTIDO Y RENDERIZAR</button>
</div>

<script>
    function factorial(n) {
        if (n === 0 || n === 1) return 1;
        let res = 1;
        for (let i = 2; i <= n; i++) res *= i;
        return res;
    }

    function poisson(k, lambda) {
        if (lambda <= 0) return k === 0 ? 1 : 0;
        return (Math.exp(-lambda) * Math.pow(lambda, k)) / factorial(k);
    }

    function getDeltaStatus(delta) {
        if (delta > 0.3) return { icon: '🚀', text: 'Alto Sobrerendimiento' };
        if (delta > 0.1) return { icon: '📈', text: 'Sobrerendimiento' };
        if (delta < -0.3) return { icon: '📉', text: 'Alto Subrendimiento' };
        if (delta < -0.1) return { icon: '📊', text: 'Subrendimiento' };
        return { icon: '🎯', text: 'Estable' };
    }

    function calculateKelly(prob, odd) {
        if (!odd || odd <= 1) return 0;
        let p = prob / 100;
        let q = 1 - p;
        let b = odd - 1;
        let k = (b * p - q) / b;
        let fraction = k / 1.8; // Kelly fraccionado
        return fraction > 0 ? (fraction * 100).toFixed(2) : 0;
    }

    function calculateAll() {
        // --- 1. Entrada de datos ---
        const xgL_raw = parseFloat(document.getElementById('xgLocal').value) || 0;
        const gfL = parseFloat(document.getElementById('gfLocal').value) || 0;
        const xgV_raw = parseFloat(document.getElementById('xgVisit').value) || 0;
        const gfV = parseFloat(document.getElementById('gfVisit').value) || 0;
        const userOdd = parseFloat(document.getElementById('marketOdd').value) || 0;

        // --- 2. Cálculo de Deltas y Estado ---
        const dL = xgL_raw - gfL;
        const dV = xgV_raw - gfV;
        const statusL = getDeltaStatus(dL);
        const statusV = getDeltaStatus(dV);

        // --- 3. Ajuste de Poisson por Delta ---
        let adjL = xgL_raw + (dL * 0.1); 
        let adjV = xgV_raw + (dV * 0.1);
        adjL = Math.max(0.1, adjL);
        adjV = Math.max(0.1, adjV);

        // --- 4. Actualizar UI de Deltas ---
        document.getElementById('deltaLocal').innerHTML = `${statusL.icon} ${dL.toFixed(2)}<br><small>${statusL.text}</small>`;
        document.getElementById('deltaVisit').innerHTML = `${statusV.icon} ${dV.toFixed(2)}<br><small>${statusV.text}</small>`;
        document.getElementById('adjLocal').innerText = `xG Ajustado: ${adjL.toFixed(2)}`;
        document.getElementById('adjVisit').innerText = `xG Ajustado: ${adjV.toFixed(2)}`;

        // --- 5. Cálculo Poisson - Matriz de Marcadores Exactos ---
        let probMatrix = Array(11).fill(0).map(() => Array(11).fill(0));
        for (let i = 0; i <= 10; i++) {
            for (let j = 0; j <= 10; j++) {
                probMatrix[i][j] = poisson(i, adjL) * poisson(j, adjV);
            }
        }

        // --- 6. Análisis Específico de Mercados ---
        let markets = [];

        // Resultado Final
        let winL = 0, draw = 0, winV = 0;
        // Goles Totales
        let o15 = 0, u15 = 0, o25 = 0, u25 = 0, o35 = 0, u35 = 0;
        // Ambos Marcan
        let bttsY = 0, bttsN = 0;
        // Equipo
        let goalsL = Array(11).fill(0);
        let goalsV = Array(11).fill(0);

        for (let i = 0; i <= 10; i++) {
            for (let j = 0; j <= 10; j++) {
                let prob = probMatrix[i][j];
                
                if (i > j) winL += prob;
                else if (i < j) winV += prob;
                else draw += prob;

                if (i + j > 1.5) o15 += prob; else u15 += prob;
                if (i + j > 2.5) o25 += prob; else u25 += prob;
                if (i + j > 3.5) o35 += prob; else u35 += prob;
                
                if (i > 0 && j > 0) bttsY += prob; else bttsN += prob;

                goalsL[i] += prob;
                goalsV[j] += prob;
            }
        }

        // Añadir mercados básicos a la lista de análisis
        markets.push({ name: 'Ganador: Local', p: winL });
        markets.push({ name: 'Ganador: Empate', p: draw });
        markets.push({ name: 'Ganador: Visitante', p: winV });
        markets.push({ name: 'Over 1.5', p: o15 });
        markets.push({ name: 'Under 1.5', p: u15 });
        markets.push({ name: 'Over 2.5', p: o25 });
        markets.push({ name: 'Under 2.5', p: u25 });
        markets.push({ name: 'Ambos Marcan: Sí', p: bttsY });
        markets.push({ name: 'Ambos Marcan: No', p: bttsN });

        // Marcador Exacto (Top 3)
        let flatMatrix = [];
        for(let i=0; i<6; i++) {
            for(let j=0; j<6; j++) {
                flatMatrix.push({ name: `Marcador: ${i}-${j}`, p: probMatrix[i][j] });
            }
        }
        flatMatrix.sort((a,b) => b.p - a.p);
        markets.push(...flatMatrix.slice(0, 3));

        // --- 7. Selección del Mercado con Mayor Probabilidad ---
        let bestMarket = markets.reduce((prev, current) => (prev.p > current.p) ? prev : current);

        // --- 8. Mostrar Sugerencia ---
        const suggestionBox = document.getElementById('marketSuggestion');
        suggestionBox.style.display = 'block';

        const bestProb = bestMarket.p * 100;
        const fairOdd = (100 / bestProb);
        const value = userOdd ? ((userOdd / fairOdd) - 1) * 100 : 0;
        const kelly = calculateKelly(bestProb, userOdd);

        suggestionBox.innerHTML = `
            <div class="suggestion-title">⚡ Análisis Delta-Poisson (Mejor Opción)</div>
            <div>Mercado Sugerido: <strong>${bestMarket.name}</strong></div>
            <div>Probabilidad: ${bestProb.toFixed(2)}%</div>
            <div>Cuota Justa: ${fairOdd.toFixed(2)} | Cuota Mercado: ${userOdd || 'N/A'}</div>
            ${userOdd ? `
                <div style="margin-top: 10px;">
                    <strong>Valor: ${value > 0 ? '+' : ''}${value.toFixed(2)}%</strong>
                    <br><span class="val-badge" style="background:${value > 0 ? 'var(--success)' : 'var(--danger)'}">Kelly: ${kelly}%</span>
                </div>
            ` : ''}
        `;
    }
</script>

</body>
</html>
