<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poisson AI - Motor de Decisión Pro</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #00adb5;
            --border-color: #333;
            --input-bg: #2d2d2d;
            --success: #00ff88;
            --warning: #ffcc00;
            --danger: #ff4444;
            --ai-glow: 0 0 15px rgba(0, 173, 181, 0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        h1 { text-align: center; color: var(--accent-color); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .subtitle { text-align: center; font-size: 0.9em; color: #888; margin-bottom: 30px; }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #aaa; }

        input {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
            outline: none;
        }
        
        input:focus { border-color: var(--accent-color); }

        button {
            width: 100%;
            padding: 18px;
            background: var(--accent-color);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            transition: 0.3s;
            box-shadow: var(--ai-glow);
        }

        button:hover { background: #008c95; transform: translateY(-2px); }

        .delta-box {
            font-size: 1.5em;
            text-align: center;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            background: #252525;
            font-weight: bold;
        }

        .val-badge {
            color: #000;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85em;
        }

        .adjustment-info {
            font-size: 0.75em;
            color: var(--accent-color);
            text-align: center;
            margin-top: 5px;
            font-style: italic;
        }

        .suggestion-box {
            margin-top: 15px;
            padding: 20px;
            background: #1a2a2b;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--accent-color);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .suggestion-title {
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .ai-reasoning {
            font-size: 0.85em;
            color: #aaa;
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🤖 Poisson AI Decision Engine</h1>
    <p class="subtitle">Análisis Multidimensional de Datos y Valor</p>

    <div class="grid-inputs">
        <div class="card">
            <h3>Local</h3>
            <div class="input-group">
                <label>xG Proyectado (Expectativa)</label>
                <input type="number" id="xgLocal" step="0.01" placeholder="Ej: 1.65">
            </div>
            <div class="input-group">
                <label>Goles Reales (GF)</label>
                <input type="number" id="gfLocal" step="0.01" placeholder="Ej: 1.40">
            </div>
            <div id="deltaLocal" class="delta-box">-</div>
            <div id="adjLocal" class="adjustment-info"></div>
        </div>

        <div class="card">
            <h3>Visitante</h3>
            <div class="input-group">
                <label>xG Proyectado (Expectativa)</label>
                <input type="number" id="xgVisit" step="0.01" placeholder="Ej: 1.20">
            </div>
            <div class="input-group">
                <label>Goles Reales (GF)</label>
                <input type="number" id="gfVisit" step="0.01" placeholder="Ej: 1.10">
            </div>
            <div id="deltaVisit" class="delta-box">-</div>
            <div id="adjVisit" class="adjustment-info"></div>
        </div>
    </div>

    <div class="card" style="margin-bottom: 20px;">
        <h3>Validación de Mercado</h3>
        <div class="grid-inputs" style="margin-bottom: 0;">
            <input type="number" id="marketOdd" step="0.01" placeholder="Ingresa Cuota de Referencia (Ej: 1.80)">
        </div>
        <div id="marketSuggestion" class="suggestion-box" style="display:none;"></div>
    </div>

    <button onclick="calculateAI()">EJECUTAR MOTOR DE DECISIÓN IA</button>
</div>

<script>
    function factorial(n) {
        if (n === 0 || n === 1) return 1;
        let res = 1;
        for (let i = 2; i <= n; i++) res *= i;
        return res;
    }

    function poisson(k, lambda) {
        if (lambda <= 0) return k === 0 ? 1 : 0;
        return (Math.exp(-lambda) * Math.pow(lambda, k)) / factorial(k);
    }

    function getDeltaStatus(delta) {
        if (delta > 0.3) return { icon: '📉', text: 'Alto Subrendimiento', score: -2 };
        if (delta > 0.1) return { icon: '📊', text: 'Subrendimiento', score: -1 };
        if (delta < -0.3) return { icon: '🚀', text: 'Alto Sobrerendimiento', score: 2 };
        if (delta < -0.1) return { icon: '📈', text: 'Sobrerendimiento', score: 1 };
        return { icon: '🎯', text: 'Estable', score: 0 };
    }

    function calculateKelly(prob, odd) {
        if (!odd || odd <= 1) return 0;
        let p = prob / 100;
        let q = 1 - p;
        let b = odd - 1;
        let k = (b * p - q) / b;
        return k > 0 ? (k / 1.8 * 100).toFixed(2) : 0;
    }

    function calculateAI() {
        const xgL = parseFloat(document.getElementById('xgLocal').value) || 0;
        const gfL = parseFloat(document.getElementById('gfLocal').value) || 0;
        const xgV = parseFloat(document.getElementById('xgVisit').value) || 0;
        const gfV = parseFloat(document.getElementById('gfVisit').value) || 0;
        const userOdd = parseFloat(document.getElementById('marketOdd').value) || 0;

        const dL = xgL - gfL;
        const dV = xgV - gfV;
        const sL = getDeltaStatus(dL);
        const sV = getDeltaStatus(dV);

        // Ajuste IA de Goles (Sensibilidad 0.25)
        let adjL = xgL + (dL * 0.25);
        let adjV = xgV + (dV * 0.25);
        adjL = Math.max(0.1, adjL);
        adjV = Math.max(0.1, adjV);

        document.getElementById('deltaLocal').innerHTML = `${dL > 0 ? '+' : ''}${dL.toFixed(2)}<br><small>${sL.text}</small>`;
        document.getElementById('deltaVisit').innerHTML = `${dV > 0 ? '+' : ''}${dV.toFixed(2)}<br><small>${sV.text}</small>`;
        document.getElementById('adjLocal').innerText = `λ Dinámico: ${adjL.toFixed(2)}`;
        document.getElementById('adjVisit').innerText = `λ Dinámico: ${adjV.toFixed(2)}`;

        let probL = []; let probV = [];
        for (let i = 0; i <= 10; i++) {
            probL.push(poisson(i, adjL));
            probV.push(poisson(i, adjV));
        }

        let o25 = 0, u25 = 0, bttsY = 0, bttsN = 0, locO15 = 0, visO15 = 0;
        for (let i = 0; i <= 10; i++) {
            for (let j = 0; j <= 10; j++) {
                let p = probL[i] * probV[j];
                if (i + j > 2.5) o25 += p; else u25 += p;
                if (i > 0 && j > 0) bttsY += p; else bttsN += p;
                if (i > 1.5) locO15 += p;
                if (j > 1.5) visO15 += p;
            }
        }

        // --- SISTEMA DE PUNTUACIÓN DE IA (REASONING) ---
        const markets = [
            { id: 'o25', name: 'Over 2.5 Goles', p: o25, type: 'over' },
            { id: 'u25', name: 'Under 2.5 Goles', p: u25, type: 'under' },
            { id: 'bttsY', name: 'Ambos Marcan: SÍ', p: bttsY, type: 'over' },
            { id: 'bttsN', name: 'Ambos Marcan: NO', p: bttsN, type: 'under' },
            { id: 'locO15', name: 'Local Over 1.5', p: locO15, type: 'over' },
            { id: 'visO15', name: 'Visitante Over 1.5', p: visO15, type: 'over' }
        ];

        // La IA puntúa cada mercado según el Delta y la Probabilidad
        markets.forEach(m => {
            m.aiScore = m.p * 100; // Base: Probabilidad
            // Si es un mercado de 'over' y hay sobrerendimiento, sube la confianza
            if (m.type === 'over') m.aiScore += (sL.score + sV.score) * 2;
            // Si es un mercado de 'under' y hay subrendimiento, sube la confianza
            if (m.type === 'under') m.aiScore -= (sL.score + sV.score) * 2;
            
            // FILTRO DE CUOTA 1.7+ (Busca probabilidad ideal entre 40% y 58%)
            if (m.p >= 0.40 && m.p <= 0.58) m.aiScore += 15; // Bonus por rango de valor
        });

        let bestMarket = markets.reduce((prev, curr) => (prev.aiScore > curr.aiScore) ? prev : curr);

        const box = document.getElementById('marketSuggestion');
        box.style.display = 'block';
        const finalP = bestMarket.p * 100;
        const fair = (100 / finalP);
        const val = userOdd ? ((userOdd / fair) - 1) * 100 : 0;
        const reason = (bestMarket.type === 'over' && (sL.score + sV.score) > 0) 
            ? "Detectada tendencia de alta eficacia ofensiva (Delta Negativo)." 
            : "Estadística de tendencia defensiva o baja generación detectada.";

        box.innerHTML = `
            <div class="suggestion-title">🧠 IA DECISION: ${bestMarket.name}</div>
            <div style="font-size: 1.1em; margin: 10px 0;">
                Confianza IA: <strong>${bestMarket.aiScore.toFixed(1)}pts</strong> | Prob: ${finalP.toFixed(2)}%
            </div>
            <div>Cuota Justa: ${fair.toFixed(2)}</div>
            ${userOdd ? `
                <div style="margin-top: 15px;">
                    <span class="val-badge" style="background:${val > 0 ? 'var(--success)' : 'var(--warning)'}">
                        Valor: ${val.toFixed(2)}%
                    </span>
                    <span class="val-badge" style="background:white; margin-left:10px;">Kelly: ${calculateKelly(finalP, userOdd)}%</span>
                </div>
            ` : ''}
            <div class="ai-reasoning">"He seleccionado este mercado porque combina una probabilidad sólida con un ajuste Delta favorable. ${reason}"</div>
        `;
    }
</script>

</body>
</html>
