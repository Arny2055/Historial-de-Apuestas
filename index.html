<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BETAGS - Poisson Calculator</title>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-card: #151921;
            --primary: #4dabf7;
            --accent-green: #51cf66;
            --accent-red: #ff6b6b;
            --accent-yellow: #fcc419;
            --text-white: #e9ecef;
            --text-muted: #adb5bd;
            --border: #2c3440;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-white);
            margin: 0;
            padding: 0;
            display: flex; 
            justify-content: center;
            min-height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 600px; 
            padding: 20px; 
            box-sizing: border-box;
        }

        h1 { font-size: 1.6rem; color: var(--primary); text-align: center; margin: 25px 0; letter-spacing: 4px; font-weight: 900; }
        h1 span { color: var(--text-white); }

        .section-title { 
            font-size: 0.75rem; 
            color: var(--primary); 
            text-transform: uppercase; 
            margin: 20px 0 12px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-weight: 800; 
            letter-spacing: 1px;
        }
        
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .input-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }

        .full-width { grid-column: span 2; }
        
        label {
            display: block;
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: bold;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            background: #0b0e14;
            color: white;
            font-size: 0.9rem;
            outline: none;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--primary); }

        .btn-analyze {
            width: 100%;
            background: linear-gradient(135deg, #4dabf7, #228be6);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(34, 139, 230, 0.4);
        }

        .btn-analyze:active { transform: scale(0.98); }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        .result-box {
            background: var(--glass);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .res-label { font-size: 0.6rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase; }
        .res-val { font-size: 1.2rem; font-weight: 900; margin: 5px 0; color: var(--accent-yellow); }
        .res-prob { font-size: 0.7rem; color: var(--primary); font-family: monospace; }

        .header-match {
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>BETA<span>GS</span> POISSON</h1>

    <div class="section-title"><span>📝</span> DATOS DEL PARTIDO</div>
    <div class="card">
        <div class="input-grid">
            <div class="full-width">
                <label>NOMBRE DE LA LIGA</label>
                <input type="text" id="leagueName" placeholder="Ej: Premier League">
            </div>
            <div>
                <label>EQUIPO LOCAL</label>
                <input type="text" id="homeTeam" placeholder="Local">
            </div>
            <div>
                <label>EQUIPO VISITA</label>
                <input type="text" id="awayTeam" placeholder="Visita">
            </div>
            <div>
                <label>AVG GOLES LOCAL</label>
                <input type="number" id="avgGLocal" step="0.01" placeholder="0.00">
            </div>
            <div>
                <label>AVG GOLES VISITA</label>
                <input type="number" id="avgGVisita" step="0.01" placeholder="0.00">
            </div>
            <div>
                <label>AVG LIGA LOCAL</label>
                <input type="number" id="avgGLigaLocal" step="0.01" placeholder="0.00">
            </div>
            <div>
                <label>AVG LIGA VISITA</label>
                <input type="number" id="avgGLigaVisita" step="0.01" placeholder="0.00">
            </div>
        </div>
        
        <button class="btn-analyze" onclick="calcularPoisson()">🚀 CALCULAR PROBABILIDADES</button>
    </div>

    <div id="resultsPanel" style="display: none;">
        <div class="section-title"><span>📊</span> RESULTADOS DEL ANÁLISIS</div>
        <div class="card">
            <div class="header-match">
                <div id="resLeague" style="font-size: 0.7rem; color: var(--primary); font-weight: 800;"></div>
                <div id="resMatch" style="font-size: 1.1rem; font-weight: 900; margin-top: 5px;"></div>
            </div>

            <div class="results-grid">
                <div class="result-box">
                    <div class="res-label">Over 2.5 FT</div>
                    <div class="res-val" id="ov25_val">0%</div>
                    <div class="res-prob" id="ov25_odd">1.00</div>
                </div>
                <div class="result-box">
                    <div class="res-label">Under 2.5 FT</div>
                    <div class="res-val" id="un25_val">0%</div>
                    <div class="res-prob" id="un25_odd">1.00</div>
                </div>
                <div class="result-box">
                    <div class="res-label">BTTS YES</div>
                    <div class="res-val" id="bttsY_val">0%</div>
                    <div class="res-prob" id="bttsY_odd">1.00</div>
                </div>
                <div class="result-box">
                    <div class="res-label">BTTS NO</div>
                    <div class="res-val" id="bttsN_val">0%</div>
                    <div class="res-prob" id="bttsN_odd">1.00</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function factorial(n) {
        let r = 1;
        for (let i = 2; i <= n; i++) r *= i;
        return r;
    }

    function poisson(k, lambda) {
        return (Math.exp(-lambda) * Math.pow(lambda, k)) / factorial(k);
    }

    function calcularPoisson() {
        // Captura de datos
        const league = document.getElementById('leagueName').value || "LIGA DESCONOCIDA";
        const home = document.getElementById('homeTeam').value || "LOCAL";
        const away = document.getElementById('awayTeam').value || "VISITA";
        
        const avgGL = parseFloat(document.getElementById('avgGLocal').value);
        const avgGV = parseFloat(document.getElementById('avgGVisita').value);
        const avgGLL = parseFloat(document.getElementById('avgGLigaLocal').value);
        const avgGLV = parseFloat(document.getElementById('avgGLigaVisita').value);

        if (isNaN(avgGL) || isNaN(avgGV) || isNaN(avgGLL) || isNaN(avgGLV)) {
            alert("Por favor completa todos los campos numéricos.");
            return;
        }

        // Lógica de cálculo solicitada
        const lambdaL = avgGL * avgGV * avgGLL;
        const lambdaV = avgGL * avgGV * avgGLV;

        // Distribución de probabilidades (0 a 6 goles)
        let probL = [];
        let probV = [];
        for (let i = 0; i <= 20; i++) {
            probL[i] = poisson(i, lambdaL);
            probV[i] = poisson(i, lambdaV);
        }

        // Cálculo Under 2.5 (Suma de 0-0, 1-0, 0-1, 1-1, 2-0, 0-2)
        let probUnder25 = 0;
        for (let i = 0; i <= 2; i++) {
            for (let j = 0; j <= 2; j++) {
                if (i + j <= 2) {
                    probUnder25 += probL[i] * probV[j];
                }
            }
        }

        const probOver25 = 1 - probUnder25;

        // Cálculo BTTS No (Al menos uno se queda en 0)
        // BTTS No = Prob(L=0) + Prob(V=0) - Prob(Ambos 0)
        const probL0 = probL[0];
        const probV0 = probV[0];
        const probBTTS_No = (probL0 + probV0) - (probL0 * probV0);
        const probBTTS_Yes = 1 - probBTTS_No;

        // Mostrar Resultados
        document.getElementById('resLeague').innerText = league;
        document.getElementById('resMatch').innerText = `${home} vs ${away}`;

        updateResult('ov25', probOver25);
        updateResult('un25', probUnder25);
        updateResult('bttsY', probBTTS_Yes);
        updateResult('bttsN', probBTTS_No);

        document.getElementById('resultsPanel').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function updateResult(id, prob) {
        const percent = (prob * 100).toFixed(1) + '%';
        const odd = prob > 0 ? (1 / prob).toFixed(2) : "0.00";
        document.getElementById(id + '_val').innerText = percent;
        document.getElementById(id + '_odd').innerText = 'CUOTA: ' + odd;
    }
</script>

</body>
</html>
