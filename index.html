<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BETAGS - xG & Poisson Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-card: #151921;
            --primary: #4dabf7;
            --accent-green: #51cf66;
            --accent-yellow: #fcc419;
            --accent-blue: #339af0;
            --text-white: #e9ecef;
            --text-muted: #adb5bd;
            --border: #2c3440;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-white); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; }
        
        .card { background: var(--bg-card); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h1 { color: var(--primary); text-align: center; letter-spacing: 2px; font-weight: 900; margin-bottom: 5px; }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-bottom: 25px; display: block; }

        .section-title { font-size: 0.7rem; color: var(--primary); text-transform: uppercase; font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        
        textarea { width: 100%; height: 120px; background: #0b0e14; border: 1px solid var(--border); border-radius: 10px; color: #51cf66; font-family: monospace; font-size: 0.75rem; padding: 10px; box-sizing: border-box; resize: none; transition: 0.3s; }
        textarea:focus { border-color: var(--primary); outline: none; }
        
        .selector-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        select { width: 100%; padding: 12px; border-radius: 8px; background: #0b0e14; color: white; border: 1px solid var(--border); outline: none; cursor: pointer; }
        
        .btn { width: 100%; background: linear-gradient(135deg, #4dabf7, #228be6); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 20px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(77, 171, 247, 0.4); }

        .xg-display-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .xg-box { background: rgba(77, 171, 247, 0.05); border: 1px solid var(--primary); border-radius: 12px; padding: 15px; text-align: center; }
        .xg-box label { font-size: 0.65rem; color: var(--primary); font-weight: 800; display: block; margin-bottom: 5px; }
        .xg-box .val { font-size: 1.8rem; font-weight: 900; color: var(--text-white); }

        .stats-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-top: 15px; }
        .stat-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; border: 1px solid var(--border); text-align: center; }
        .stat-item label { font-size: 0.6rem; color: var(--text-muted); display: block; }
        .stat-item b { color: var(--accent-yellow); font-size: 0.9rem; }

        #results { display: none; }
        .prob-card { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .prob-box { background: var(--bg-dark); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border); transition: 0.3s; }
        .prob-box:hover { border-color: var(--primary); }
        .prob-box span { font-size: 0.65rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }
        .prob-box .val { font-size: 1.3rem; font-weight: 900; color: var(--accent-green); display: block; margin-top: 5px; }
        
        .chart-container { height: 250px; margin-top: 25px; }
    </style>
</head>
<body>

<div class="container">
    <h1>BETA<span>GS</span> ENGINE PRO</h1>
    <span class="subtitle">Análisis de xG Dinámico & Distribución Poisson</span>

    <div class="card">
        <div class="section-title"><span>📂</span> 1. TABLA FORM LOCAL (HOME)</div>
        <textarea id="homeTableInput" placeholder="Pega aquí la tabla de local..."></textarea>
        
        <div class="section-title" style="margin-top: 20px;"><span>📂</span> 2. TABLA FORM VISITA (AWAY)</div>
        <textarea id="awayTableInput" placeholder="Pega aquí la tabla de visita..."></textarea>

        <button class="btn" onclick="parseTables()">1. PROCESAR ESTADÍSTICAS LIGA</button>
    </div>

    <div id="selectionArea" class="card" style="display:none;">
        <div class="section-title"><span>⚔️</span> 3. CONFIGURAR PARTIDO</div>
        <div class="selector-grid">
            <div>
                <label>EQUIPO LOCAL</label>
                <select id="selectHome"></select>
            </div>
            <div>
                <label>EQUIPO VISITANTE</label>
                <select id="selectAway"></select>
            </div>
        </div>
        <button class="btn" style="background: var(--accent-green); color: black;" onclick="calculatePoisson()">2. EJECUTAR CÁLCULO xG</button>
    </div>

    <div id="results" class="card">
        <div class="section-title"><span>📊</span> PANEL DE RESULTADOS xG</div>
        <div id="matchTitle" style="text-align: center; font-weight: 900; font-size: 1.3rem; margin-bottom: 5px; color: var(--primary);"></div>
        
        <div class="xg-display-grid">
            <div class="xg-box">
                <label id="nameL_label">xG LOCAL</label>
                <div class="val" id="val_xgL">0.00</div>
            </div>
            <div class="xg-box">
                <label id="nameV_label">xG VISITA</label>
                <div class="val" id="val_xgV">0.00</div>
            </div>
        </div>

        <div class="stats-summary">
            <div class="stat-item"><label>F. Ataque (L)</label><b id="resFAL">0.00</b></div>
            <div class="stat-item"><label>F. Defensa (L)</label><b id="resFDL">0.00</b></div>
            <div class="stat-item"><label>F. Ataque (V)</label><b id="resFAV">0.00</b></div>
            <div class="stat-item"><label>F. Defensa (V)</label><b id="resFDV">0.00</b></div>
        </div>

        <div class="prob-card">
            <div class="prob-box"><span>Local</span><span class="val" id="pWinL">0%</span></div>
            <div class="prob-box"><span>Empate</span><span class="val" id="pDraw">0%</span></div>
            <div class="prob-box"><span>Visita</span><span class="val" id="pWinV">0%</span></div>
        </div>

        <div class="prob-card">
            <div class="prob-box"><span>Over 2.5</span><span class="val" id="pO25">0%</span></div>
            <div class="prob-box"><span>Ambos Marcan</span><span class="val" id="pBTTS">0%</span></div>
            <div class="prob-box"><span>Under 2.5</span><span class="val" id="pU25">0%</span></div>
        </div>

        <div class="chart-container">
            <canvas id="poissonChart"></canvas>
        </div>
    </div>
</div>

<script>
let homeData = [], awayData = [];
let avgLeagueGF_Home = 0, avgLeagueGF_Away = 0;
let chartInstance = null;

function parseTable(text) {
    const lines = text.trim().split('\n');
    const teams = [];
    
    lines.forEach(line => {
        // Limpiamos la línea de espacios extra
        const parts = line.trim().split(/\s+/);
        
        // Buscamos líneas que parezcan datos (mínimo 8 columnas)
        // Estructura esperada desde el final: PPG(7), Opp(6), Pts(5), GD(4), GA(3), GF(2), L(1), D(0)
        if (parts.length >= 8) {
            // Intentamos localizar las columnas numéricas de goles (GF y GA)
            // En tu formato, GF es la 5ta columna contando desde Pts hacia atrás
            // Pero es más seguro buscar el bloque de números: GP W D L GF GA GD Pts
            
            let dataStartIndex = -1;
            // Buscamos donde empieza el número de partidos jugados (GP) que suele ser el primer número tras el nombre
            for(let i = 1; i < parts.length; i++) {
                if(!isNaN(parts[i]) && !isNaN(parts[i+1]) && parts[i].length <= 2) {
                    dataStartIndex = i;
                    break;
                }
            }

            if (dataStartIndex !== -1) {
                const name = parts.slice(1, dataStartIndex).join(" ");
                const gp = parseInt(parts[dataStartIndex]);
                const gf = parseInt(parts[dataStartIndex + 4]);
                const ga = parseInt(parts[dataStartIndex + 5]);

                if (!isNaN(gp) && gp > 0 && !isNaN(gf) && !isNaN(ga)) {
                    teams.push({
                        name: name,
                        gp: gp,
                        gf: gf,
                        ga: ga,
                        avgGF: gf / gp,
                        avgGA: ga / gp
                    });
                }
            }
        }
    });
    return teams;
}

function parseTables() {
    const homeInput = document.getElementById('homeTableInput').value;
    const awayInput = document.getElementById('awayTableInput').value;

    homeData = parseTable(homeInput);
    // Si la tabla de visita está vacía, usamos la de local para permitir pruebas, 
    // pero lo ideal es que pegues ambas.
    awayData = parseTable(awayInput || homeInput);

    if (homeData.length === 0) {
        alert("Error: No se pudieron extraer datos de la tabla local. Verifica el formato.");
        return;
    }

    // Goles promedio de toda la liga
    avgLeagueGF_Home = homeData.reduce((sum, t) => sum + t.avgGF, 0) / homeData.length;
    avgLeagueGF_Away = awayData.reduce((sum, t) => sum + t.avgGF, 0) / awayData.length;

    const sH = document.getElementById('selectHome');
    const sV = document.getElementById('selectAway');
    sH.innerHTML = ""; sV.innerHTML = "";

    homeData.sort((a,b) => a.name.localeCompare(b.name)).forEach(t => sH.add(new Option(t.name, t.name)));
    awayData.sort((a,b) => a.name.localeCompare(b.name)).forEach(t => sV.add(new Option(t.name, t.name)));

    document.getElementById('selectionArea').style.display = 'block';
    window.scrollTo({ top: document.getElementById('selectionArea').offsetTop, behavior: 'smooth' });
}

function factorial(n) { 
    if (n === 0) return 1;
    let res = 1;
    for (let i = 2; i <= n; i++) res *= i;
    return res;
}

function poisson(k, lambda) { 
    return (Math.exp(-lambda) * Math.pow(lambda, k)) / factorial(k); 
}

function calculatePoisson() {
    const homeTeam = homeData.find(t => t.name === document.getElementById('selectHome').value);
    const awayTeam = awayData.find(t => t.name === document.getElementById('selectAway').value);

    // 1. FUERZAS RELATIVAS
    const FA_L = homeTeam.avgGF / avgLeagueGF_Home;
    const FD_L = homeTeam.avgGA / avgLeagueGF_Away;
    const FA_V = awayTeam.avgGF / avgLeagueGF_Away;
    const FD_V = awayTeam.avgGA / avgLeagueGF_Home;

    // 2. CÁLCULO DE xG (λ)
    const lambdaL = FA_L * FD_V * avgLeagueGF_Home;
    const lambdaV = FA_V * FD_L * avgLeagueGF_Away;

    // 3. GENERAR PROBABILIDADES
    let pL = 0, pV = 0, pX = 0, pO25 = 0, pBTTS = 0;
    let probL = [], probV = [];

    for (let i = 0; i <= 10; i++) {
        probL[i] = poisson(i, lambdaL);
        probV[i] = poisson(i, lambdaV);
    }

    for (let i = 0; i <= 10; i++) {
        for (let j = 0; j <= 10; j++) {
            let p = probL[i] * probV[j];
            if (i > j) pL += p;
            else if (i < j) pV += p;
            else pX += p;

            if (i + j > 2.5) pO25 += p;
            if (i > 0 && j > 0) pBTTS += p;
        }
    }

    // UI UPDATE
    document.getElementById('matchTitle').innerText = `${homeTeam.name.toUpperCase()} VS ${awayTeam.name.toUpperCase()}`;
    document.getElementById('nameL_label').innerText = `xG ${homeTeam.name}`;
    document.getElementById('nameV_label').innerText = `xG ${awayTeam.name}`;
    document.getElementById('val_xgL').innerText = lambdaL.toFixed(2);
    document.getElementById('val_xgV').innerText = lambdaV.toFixed(2);
    
    document.getElementById('resFAL').innerText = FA_L.toFixed(2);
    document.getElementById('resFDL').innerText = FD_L.toFixed(2);
    document.getElementById('resFAV').innerText = FA_V.toFixed(2);
    document.getElementById('resFDV').innerText = FD_V.toFixed(2);
    
    document.getElementById('pWinL').innerText = (pL * 100).toFixed(1) + "%";
    document.getElementById('pWinV').innerText = (pV * 100).toFixed(1) + "%";
    document.getElementById('pDraw').innerText = (pX * 100).toFixed(1) + "%";
    document.getElementById('pO25').innerText = (pO25 * 100).toFixed(1) + "%";
    document.getElementById('pU25').innerText = ((1-pO25) * 100).toFixed(1) + "%";
    document.getElementById('pBTTS').innerText = (pBTTS * 100).toFixed(1) + "%";

    document.getElementById('results').style.display = 'block';
    renderChart(probL.slice(0,6), probV.slice(0,6));
    window.scrollTo({ top: document.getElementById('results').offsetTop, behavior: 'smooth' });
}

function renderChart(l, v) {
    const ctx = document.getElementById('poissonChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['0', '1', '2', '3', '4', '5'],
            datasets: [
                { label: 'Prob. Goles Local', data: l, backgroundColor: '#4dabf7', borderRadius: 5 },
                { label: 'Prob. Goles Visita', data: v, backgroundColor: '#fcc419', borderRadius: 5 }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { 
                legend: { display: true, labels: { color: '#adb5bd', font: { size: 10 } } } 
            },
            scales: { 
                y: { display: false }, 
                x: { ticks: { color: '#adb5bd' }, grid: { display: false } } 
            }
        }
    });
}
</script>
</body>
</html>
