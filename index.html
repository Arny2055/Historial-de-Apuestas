<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Poisson Pro - xG & Delta</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #00adb5;
            --border-color: #333;
            --input-bg: #2d2d2d;
            --success: #00ff88;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        h1 { text-align: center; color: var(--accent-color); }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #aaa; }

        input {
            width: 100%;
            padding: 10px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            transition: 0.3s;
        }

        button:hover { background: #008c95; }

        .results-table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: var(--card-bg);
        }

        .results-table th, .results-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .results-table th { background: #252525; color: var(--accent-color); }

        .delta-box {
            font-size: 1.5em;
            text-align: center;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            background: #252525;
        }

        .val-badge {
            background: var(--success);
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8em;
        }

        .kelly-info { font-size: 0.85em; color: #888; margin-top: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚽ Poisson Calculator & Kelly 1.8</h1>

    <div class="grid-inputs">
        <div class="card">
            <h3>Local</h3>
            <div class="input-group">
                <label>xG Manual (Predicción)</label>
                <input type="number" id="xgLocal" step="0.01" placeholder="Ej: 1.65">
            </div>
            <div class="input-group">
                <label>Promedio GF Histórico</label>
                <input type="number" id="gfLocal" step="0.01" placeholder="Ej: 1.40">
            </div>
            <div id="deltaLocal" class="delta-box">-</div>
        </div>

        <div class="card">
            <h3>Visitante</h3>
            <div class="input-group">
                <label>xG Manual (Predicción)</label>
                <input type="number" id="xgVisit" step="0.01" placeholder="Ej: 1.20">
            </div>
            <div class="input-group">
                <label>Promedio GF Histórico</label>
                <input type="number" id="gfVisit" step="0.01" placeholder="Ej: 1.10">
            </div>
            <div id="deltaVisit" class="delta-box">-</div>
        </div>
    </div>

    <div class="card" style="margin-bottom: 20px;">
        <h3>Cuotas de Mercado (Para Valor y Kelly)</h3>
        <div class="grid-inputs" style="margin-bottom: 0;">
            <input type="number" id="oddO25" step="0.01" placeholder="Cuota Over 2.5">
            <input type="number" id="oddU25" step="0.01" placeholder="Cuota Under 2.5">
            <input type="number" id="oddBTTSY" step="0.01" placeholder="Cuota BTTS Yes">
            <input type="number" id="oddBTTSN" step="0.01" placeholder="Cuota BTTS No">
        </div>
    </div>

    <button onclick="calculateAll()">CALCULAR PROBABILIDADES</button>

    <div class="card" style="margin-top: 20px; overflow-x: auto;">
        <table class="results-table">
            <thead>
                <tr>
                    <th>Mercado</th>
                    <th>Probabilidad</th>
                    <th>Cuota Justa</th>
                    <th>Valor / Kelly 1.8</th>
                </tr>
            </thead>
            <tbody id="resultsBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    function factorial(n) {
        if (n === 0 || n === 1) return 1;
        let res = 1;
        for (let i = 2; i <= n; i++) res *= i;
        return res;
    }

    function poisson(k, lambda) {
        return (Math.exp(-lambda) * Math.pow(lambda, k)) / factorial(k);
    }

    function getIcon(delta) {
        if (delta > 0.3) return '🚀';
        if (delta < -0.3) return '📉';
        return '🎯';
    }

    function calculateKelly(prob, odd) {
        if (!odd || odd <= 1) return 0;
        let p = prob / 100;
        let q = 1 - p;
        let b = odd - 1;
        let k = (b * p - q) / b;
        let fraction = k / 1.8; // Kelly 1.8 solicitado
        return fraction > 0 ? (fraction * 100).toFixed(2) : 0;
    }

    function calculateAll() {
        const xgL = parseFloat(document.getElementById('xgLocal').value) || 0;
        const gfL = parseFloat(document.getElementById('gfLocal').value) || 0;
        const xgV = parseFloat(document.getElementById('xgVisit').value) || 0;
        const gfV = parseFloat(document.getElementById('gfVisit').value) || 0;

        // Deltas
        const dL = xgL - gfL;
        const dV = xgV - gfV;
        document.getElementById('deltaLocal').innerHTML = `${dL.toFixed(2)} ${getIcon(dL)}`;
        document.getElementById('deltaVisit').innerHTML = `${dV.toFixed(2)} ${getIcon(dV)}`;

        // Probabilidades Poisson 0-10 goles
        let probL = [];
        let probV = [];
        for (let i = 0; i <= 10; i++) {
            probL.push(poisson(i, xgL));
            probV.push(poisson(i, xgV));
        }

        // Mercados
        let o25 = 0, u25 = 0, bttsY = 0, bttsN = 0;
        let probL_0 = probL[0];
        let probV_0 = probV[0];

        // Matriz
        for (let i = 0; i <= 10; i++) {
            for (let j = 0; j <= 10; j++) {
                let p_score = probL[i] * probV[j];
                // Over/Under
                if (i + j > 2.5) o25 += p_score;
                else u25 += p_score;
                // BTTS
                if (i > 0 && j > 0) bttsY += p_score;
                else bttsN += p_score;
            }
        }

        const markets = [
            { name: 'Over 2.5 FT', p: o25 * 100, oddId: 'oddO25' },
            { name: 'Under 2.5 FT', p: u25 * 100, oddId: 'oddU25' },
            { name: 'BTTS Yes', p: bttsY * 100, oddId: 'oddBTTSY' },
            { name: 'BTTS No', p: bttsN * 100, oddId: 'oddBTTSN' }
        ];

        let html = '';
        markets.forEach(m => {
            const fairOdd = (100 / m.p).toFixed(2);
            const userOdd = parseFloat(document.getElementById(m.oddId).value) || 0;
            const hasValue = userOdd > fairOdd;
            const kelly = calculateKelly(m.p, userOdd);

            html += `<tr>
                <td>${m.name}</td>
                <td>${m.p.toFixed(2)}%</td>
                <td>${fairOdd}</td>
                <td>
                    ${hasValue ? '<span class="val-badge">VALOR</span>' : '<span style="color:#666">No</span>'}
                    <div class="kelly-info">${hasValue ? 'Stake Kelly: ' + kelly + '%' : ''}</div>
                </td>
            </tr>`;
        });

        document.getElementById('resultsBody').innerHTML = html;
    }
</script>

</body>
</html>
