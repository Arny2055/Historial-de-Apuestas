<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BETAGS - Deep Analytics Pro</title>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-card: #151921;
            --primary: #4dabf7;
            --accent-green: #51cf66;
            --accent-red: #ff6b6b;
            --accent-yellow: #fcc419;
            --text-white: #e9ecef;
            --text-muted: #adb5bd;
            --border: #2c3440;
            --glass: rgba(255, 255, 255, 0.03);
            --row-select: rgba(77, 171, 247, 0.15); 
            --gold-glow: 0 0 15px rgba(252, 196, 25, 0.4);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-white);
            margin: 0;
            padding: 0;
            display: flex; 
            justify-content: center;
            min-height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 900px; /* Aumentado un poco para dar espacio a los nuevos inputs */
            padding: 20px; 
            box-sizing: border-box;
            padding-bottom: 60px;
        }

        h1 { font-size: 1.6rem; color: var(--primary); text-align: center; margin: 25px 0; letter-spacing: 4px; font-weight: 900; }
        h1 span { color: var(--text-white); }

        .nav-header {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .btn-nav-roi, .btn-nav-xg {
            background: var(--glass);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 18px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-nav-xg { border-color: var(--accent-green); color: var(--accent-green); }
        .btn-nav-roi:hover { background: var(--primary); color: var(--bg-dark); }

        .section-title { 
            font-size: 0.75rem; 
            color: var(--primary); 
            text-transform: uppercase; 
            margin: 20px 0 12px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-weight: 800; 
            letter-spacing: 1px;
        }
        
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .input-grid { width: 100%; display: grid; grid-template-columns: 1fr; gap: 15px; }
        
        select, input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            background: #0b0e14;
            color: white;
            font-size: 0.9rem;
            outline: none;
            box-sizing: border-box;
        }

        .btn-analyze-master {
            width: 100%;
            background: linear-gradient(135deg, #4dabf7, #228be6);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(34, 139, 230, 0.4);
        }

        .bet-alert {
            border-left: 5px solid var(--accent-yellow) !important;
            background: rgba(252, 196, 25, 0.05) !important;
            box-shadow: var(--gold-glow);
            border-top: 1px solid rgba(252, 196, 25, 0.2);
            border-right: 1px solid rgba(252, 196, 25, 0.2);
        }

        .high-prob {
            color: var(--accent-green) !important;
            font-weight: 900;
            text-shadow: 0 0 5px rgba(81, 207, 102, 0.5);
        }

        .multi-results-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.65rem; /* Reducido para encajar mas datos */
            margin-top: 10px;
        }
        .multi-results-table th {
            background: rgba(255,255,255,0.05);
            padding: 8px 4px;
            text-align: center;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border);
        }
        .multi-results-table td {
            padding: 8px 4px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .row-active {
            background-color: var(--row-select) !important;
            border-left: 4px solid var(--primary);
        }

        .league-tag {
            background: #000000;
            color: #ffffff;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 0.6rem;
            border: 1px solid var(--border);
        }

        .score-badge {
            background: var(--accent-yellow);
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 0.7rem;
            margin: 0 4px;
        }

        .trend-badge {
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            line-height: 1;
            cursor: pointer;
        }

        .chart-container {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            margin: 15px 0;
        }
        .bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
        .bar { width: 70%; background: var(--primary); border-radius: 4px 4px 0 0; min-height: 2px; transition: 0.5s ease-out; }
        .bar.away { background: var(--accent-green); }
        .bar-label { font-size: 0.65rem; color: var(--text-muted); margin-top: 5px; font-weight: bold; }

        .probs-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .summary-box { 
            background: var(--glass);
            border-radius: 14px; 
            padding: 15px 5px; 
            text-align: center;
            border: 1px solid var(--border);
        }
        .summary-box.blue { border-top: 3px solid var(--primary); }
        .summary-box.green { border-top: 3px solid var(--accent-green); }
        .summary-box.yellow { border-top: 3px solid var(--accent-yellow); }

        .summary-val { font-size: 1.2rem; font-weight: 900; margin: 5px 0; }
        .summary-odds { font-size: 0.65rem; color: var(--accent-green); font-family: monospace; }

        .table-wrapper { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { font-size: 0.65rem; text-transform: uppercase; color: var(--text-muted); padding: 12px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 8px; border-bottom: 1px solid var(--border); font-size: 0.8rem; text-align: center;}

        .input-odds {
            width: 55px;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border);
            background: #0b0e14;
            color: var(--accent-yellow);
            font-weight: bold;
        }

        /* Input específico para xG Manual en tabla */
        .input-xg-manual {
            width: 40px;
            padding: 4px;
            font-size: 0.7rem;
            color: var(--primary);
        }

        .value-badge {
            padding: 5px 8px;
            border-radius: 6px;
            font-weight: 900;
            font-size: 0.7rem;
        }
        .positive-value { background: rgba(81, 207, 102, 0.2); color: var(--accent-green); }
        .negative-value { background: rgba(255, 107, 107, 0.1); color: var(--accent-red); }

        .btn-send-bet {
            background: var(--accent-green);
            color: var(--bg-dark);
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.7rem;
            cursor: pointer;
            display: none;
        }

        .btn-pulse {
            animation: pulse-green 1.5s infinite;
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(81, 207, 102, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(81, 207, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(81, 207, 102, 0); }
        }

        .btn-open-match {
            background: var(--primary);
            color: var(--bg-dark);
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.7rem;
            cursor: pointer;
            display: inline-block;
        }

        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 14, 20, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #multiAnalysisPanel, #singleAnalysisPanel { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #betToast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-green);
            color: var(--bg-dark);
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 0.8rem;
            display: none;
            z-index: 2000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        #tacticalModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 20px;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--bg-card);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 25px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 30px rgba(77, 171, 247, 0.3);
        }
        .modal-content h3 { color: var(--accent-yellow); margin-top: 0; }
        .modal-content p { font-size: 0.9rem; line-height: 1.5; color: var(--text-white); }
        .modal-rec {
            background: rgba(81, 207, 102, 0.1);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            padding: 10px;
            border-radius: 10px;
            font-weight: 900;
            margin: 15px 0;
            font-size: 1rem;
        }
        .btn-close-modal {
            background: var(--primary);
            border: none;
            color: black;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 900;
            margin-top: 15px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <p style="margin-top: 15px; font-weight: 800; color: var(--primary);">CARGANDO PARTIDOS...</p>
</div>

<div id="betToast">🚀 ANÁLISIS APLICADO</div>

<div id="tacticalModal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modalIcon" style="font-size: 3rem; margin-bottom: 10px;"></div>
        <h3 id="modalTitle">CONSEJO TÁCTICO</h3>
        <p id="modalText"></p>
        <div id="modalRec" class="modal-rec"></div>
        <button class="btn-close-modal" onclick="document.getElementById('tacticalModal').style.display='none'">ENTENDIDO</button>
    </div>
</div>

<div class="container">
    <h1>BETA<span>GS</span> ANALYTICS</h1>
    
    <div class="nav-header">
        <a href="roi2.html" class="btn-nav-roi"><span>🧮</span> ROI CALC</a>
        <a href="xg.html" class="btn-nav-xg"><span>⚽</span> XG ANALYTICS</a>
    </div>

    <div class="section-title"><span>⚙️</span> CONTROL DE DATOS</div>
    <div class="card">
        <div class="input-grid">
            <div style="display: flex; gap: 10px;">
                <select id="leagueSelect"></select>
                <button class="btn-nav-roi" onclick="borrarLigaSeleccionada()" style="border-color: var(--accent-red); color: var(--accent-red);">🗑️</button>
            </div>
            
            <div style="display: flex; gap: 8px;">
                <input type="text" id="newSheetName" placeholder="AÑADIR HOJA (Ej: PREMIER)...">
                <button class="btn-nav-xg" onclick="agregarNuevaLiga()" style="white-space: nowrap;">+ AÑADIR</button>
            </div>

            <button class="btn-analyze-master" onclick="analizarTodoMultiliga()">
                🔍 CARGAR PARTIDOS Y PROMEDIOS
            </button>
        </div>
    </div>
    
    <div id="multiAnalysisPanel">
        <div class="section-title"><span>🌍</span> PARTIDOS Y PROMEDIOS GF</div>
        <div class="card" style="padding: 10px;">
            <div class="table-wrapper">
                <table class="multi-results-table">
                    <thead>
                        <tr>
                            <th>LIGA</th>
                            <th>PARTIDO</th>
                            <th>GF L/V</th>
                            <th>xG L/V</th>
                            <th>O 2.5</th>
                            <th>BTTS</th>
                            <th>CASA</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="multiResultsBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const SHEETS_ID = '1lmUPv7SP0XYi9ns4jkj3RTCScxIN2pCfBJyMUp_kNRI';
    let database = {}; 
    let matchesToday = [];

    function getLeagues() {
        const saved = localStorage.getItem('betags_custom_leagues');
        return saved ? JSON.parse(saved) : [];
    }

    function renderLeagueSelect() {
        const select = document.getElementById('leagueSelect');
        const leagues = getLeagues();
        if (leagues.length === 0) {
            select.innerHTML = '<option value="">SIN HOJAS CARGADAS</option>';
            return;
        }
        leagues.sort((a,b) => a.name.localeCompare(b.name));
        select.innerHTML = leagues.map(l => `<option value="${l.sheet}">${l.name}</option>`).join('');
    }

    function agregarNuevaLiga() {
        const name = document.getElementById('newSheetName').value.trim().toUpperCase();
        if (!name) return;
        const leagues = getLeagues();
        if (leagues.some(l => l.sheet === name)) return alert("Esta hoja ya está en la lista.");
        leagues.push({name, sheet: name});
        localStorage.setItem('betags_custom_leagues', JSON.stringify(leagues));
        document.getElementById('newSheetName').value = "";
        renderLeagueSelect();
    }

    function borrarLigaSeleccionada() {
        const val = document.getElementById('leagueSelect').value;
        if(!val) return;
        let leagues = getLeagues().filter(l => l.sheet !== val);
        localStorage.setItem('betags_custom_leagues', JSON.stringify(leagues));
        renderLeagueSelect();
    }

    function poisson(k, lambda) {
        if(lambda <= 0) return k === 0 ? 1 : 0;
        return (Math.exp(-lambda) * Math.pow(lambda, k)) / factorial(k);
    }
    function factorial(n) {
        let r = 1; for (let i = 2; i <= n; i++) r *= i; return r;
    }

    // --- CARGA DE DATOS ---
    async function fetchDataForSheet(sheetName) {
        const url = `https://docs.google.com/spreadsheets/d/${SHEETS_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&range=A1:W60`;
        try {
            const res = await fetch(url);
            if (!res.ok) return null;
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
            
            let data = { teams: [] };
            rows.forEach((cols, i) => {
                if (i > 0 && cols[1] && !isNaN(parseFloat(cols[2]))) {
                    // Mapeo básico de equipos para obtener sus promedios
                    data.teams.push({ 
                        n: cols[1], 
                        gp: parseFloat(cols[2]), 
                        gf: parseFloat(cols[6]) // Goles a Favor totales
                    });
                }
            });

            if (data.teams.length === 0) return null;
            return data;
        } catch (e) { return null; }
    }

    async function analizarTodoMultiliga() {
        const loader = document.getElementById('loadingOverlay');
        loader.style.display = 'flex';
        
        const leagues = getLeagues();
        if(leagues.length === 0) {
            alert("No hay hojas configuradas.");
            loader.style.display = 'none';
            return;
        }

        database = {};
        matchesToday = [];

        // Cargar promedios de todas las ligas
        for (let l of leagues) {
            const data = await fetchDataForSheet(l.sheet);
            if (data) database[l.sheet] = data;
        }

        try {
            const url = `https://docs.google.com/spreadsheets/d/${SHEETS_ID}/gviz/tq?tqx=out:csv&sheet=PARTIDOS+DEL+DIA&range=D1:F1000`;
            const res = await fetch(url);
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));

            rows.forEach(cols => {
                const home = cols[0];
                const away = cols[2];
                if (!home || home === "LOCAL") return;
                
                // Buscar equipos en las bases de datos cargadas
                let gfL = 0, gpL = 0, gfV = 0, gpV = 0, leagueFound = "";

                for (let leagueName in database) {
                    const db = database[leagueName];
                    const lData = db.teams.find(e => e.n.toUpperCase() === home.toUpperCase());
                    const vData = db.teams.find(e => e.n.toUpperCase() === away.toUpperCase());

                    if (lData && vData) {
                        gfL = lData.gf; gpL = lData.gp;
                        gfV = vData.gf; gpV = vData.gp;
                        leagueFound = leagueName;
                        break;
                    }
                }

                matchesToday.push({
                    league: leagueFound,
                    home, away,
                    avgGFL: gpL > 0 ? (gfL/gpL).toFixed(2) : "0.00",
                    avgGFV: gpV > 0 ? (gfV/gpV).toFixed(2) : "0.00",
                    xGL: 0, xGV: 0, // Inician en 0 para ingreso manual
                    ov25: 0, btts: 0
                });
            });

            renderMultiTable();
            document.getElementById('multiAnalysisPanel').style.display = 'block';

        } catch (e) { alert("Error de conexión."); } finally { loader.style.display = 'none'; }
    }

    function renderMultiTable() {
        const body = document.getElementById('multiResultsBody');
        if(matchesToday.length === 0) {
            body.innerHTML = '<tr><td colspan="8">No hay partidos detectados.</td></tr>';
            return;
        }
        body.innerHTML = matchesToday.map((m, i) => {
            return `
            <tr id="row_match_${i}">
                <td><span class="league-tag">${m.league}</span></td>
                <td style="font-weight:bold; font-size:0.75rem;">${m.home} vs ${m.away}</td>
                <td style="color:var(--text-muted)">${m.avgGFL} / ${m.avgGFV}</td>
                <td>
                    <input type="number" step="0.1" class="input-xg-manual" id="xgL_${i}" placeholder="L" oninput="actualizarAnalisis(${i})">
                    <input type="number" step="0.1" class="input-xg-manual" id="xgV_${i}" placeholder="V" oninput="actualizarAnalisis(${i})">
                </td>
                <td id="ov25_${i}" style="font-weight:bold">--</td>
                <td id="btts_${i}" style="font-weight:bold">--</td>
                <td><input type="number" step="0.01" class="input-odds" placeholder="Cuota"></td>
                <td><button class="btn-open-match" onclick="analizarPoisson(${i})">⚽</button></td>
            </tr>`;
        }).join('');
    }

    // --- LÓGICA DE POISSON MANUAL ---
    function actualizarAnalisis(idx) {
        const xGL = parseFloat(document.getElementById(`xgL_${idx}`).value);
        const xGV = parseFloat(document.getElementById(`xgV_${idx}`).value);
        
        if (isNaN(xGL) || isNaN(xGV)) return;

        // Calcular Poisson básico
        let u25Poisson = 0;
        let pL = [], pV = [];
        for(let i=0; i<=6; i++){ pL[i]=poisson(i, xGL); pV[i]=poisson(i, xGV); }
        for(let i=0; i<=6; i++) for(let j=0; j<=6; j++) if(i+j <= 2) u25Poisson += pL[i]*pV[j];
        
        const ov25 = (1 - u25Poisson) * 100;
        const btts = (1 - (pL[0] + pV[0] - (pL[0]*pV[0]))) * 100;

        document.getElementById(`ov25_${idx}`).innerText = ov25.toFixed(0) + '%';
        document.getElementById(`btts_${idx}`).innerText = btts.toFixed(0) + '%';
        
        // Colores para destacar alta probabilidad
        document.getElementById(`ov25_${idx}`).style.color = ov25 > 65 ? 'var(--accent-green)' : 'white';
        document.getElementById(`btts_${idx}`).style.color = btts > 60 ? 'var(--accent-green)' : 'white';
    }

    function analizarPoisson(idx) {
        // Esta función podría usarse para guardar el análisis o enviar a otra pantalla
        alert("Análisis realizado con los datos ingresados.");
    }

    window.onload = () => { renderLeagueSelect(); };
</script>
</body>
</html>
