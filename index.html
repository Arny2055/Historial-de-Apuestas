<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BETAGS - Deep Analytics Pro</title>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-card: #151921;
            --primary: #4dabf7;
            --accent-green: #51cf66;
            --accent-red: #ff6b6b;
            --accent-yellow: #fcc419;
            --text-white: #e9ecef;
            --text-muted: #adb5bd;
            --border: #2c3440;
            --glass: rgba(255, 255, 255, 0.03);
            --row-select: rgba(77, 171, 247, 0.15); 
            --gold-glow: 0 0 15px rgba(252, 196, 25, 0.4);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-white);
            margin: 0;
            padding: 0;
            display: flex; 
            justify-content: center;
            min-height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 800px; 
            padding: 20px; 
            box-sizing: border-box;
            padding-bottom: 60px;
        }

        h1 { font-size: 1.6rem; color: var(--primary); text-align: center; margin: 25px 0; letter-spacing: 4px; font-weight: 900; }
        h1 span { color: var(--text-white); }

        .nav-header {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .btn-nav-roi, .btn-nav-xg {
            background: var(--glass);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 18px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-nav-xg { border-color: var(--accent-green); color: var(--accent-green); }
        .btn-nav-roi:hover { background: var(--primary); color: var(--bg-dark); }

        .section-title { 
            font-size: 0.75rem; 
            color: var(--primary); 
            text-transform: uppercase; 
            margin: 20px 0 12px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-weight: 800; 
            letter-spacing: 1px;
        }
        
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .input-grid { width: 100%; display: grid; grid-template-columns: 1fr; gap: 15px; }
        
        select, input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            background: #0b0e14;
            color: white;
            font-size: 0.9rem;
            outline: none;
            box-sizing: border-box;
        }

        .btn-analyze-master {
            width: 100%;
            background: linear-gradient(135deg, #4dabf7, #228be6);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(34, 139, 230, 0.4);
        }

        .bet-alert {
            border-left: 5px solid var(--accent-yellow) !important;
            background: rgba(252, 196, 25, 0.05) !important;
            box-shadow: var(--gold-glow);
            border-top: 1px solid rgba(252, 196, 25, 0.2);
            border-right: 1px solid rgba(252, 196, 25, 0.2);
        }

        .high-prob {
            color: var(--accent-green) !important;
            font-weight: 900;
            text-shadow: 0 0 5px rgba(81, 207, 102, 0.5);
        }

        .multi-results-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
            margin-top: 10px;
        }
        .multi-results-table th {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            text-align: center;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border);
        }
        .multi-results-table td {
            padding: 12px 5px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .row-active {
            background-color: var(--row-select) !important;
            border-left: 4px solid var(--primary);
        }

        .league-tag {
            background: #000000;
            color: #ffffff;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 0.6rem;
            border: 1px solid var(--border);
        }

        .score-badge {
            background: var(--accent-yellow);
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 0.7rem;
            margin: 0 4px;
        }

        .trend-badge {
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            line-height: 1;
            cursor: pointer;
        }

        .probs-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .summary-box { 
            background: var(--glass);
            border-radius: 14px; 
            padding: 15px 5px; 
            text-align: center;
            border: 1px solid var(--border);
        }
        .summary-box.blue { border-top: 3px solid var(--primary); }
        .summary-box.green { border-top: 3px solid var(--accent-green); }
        .summary-box.yellow { border-top: 3px solid var(--accent-yellow); }

        .summary-val { font-size: 1.2rem; font-weight: 900; margin: 5px 0; }
        .summary-odds { font-size: 0.65rem; color: var(--accent-green); font-family: monospace; }

        .table-wrapper { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { font-size: 0.65rem; text-transform: uppercase; color: var(--text-muted); padding: 12px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 8px; border-bottom: 1px solid var(--border); font-size: 0.8rem; text-align: center;}

        .input-odds {
            width: 55px;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border);
            background: #0b0e14;
            color: var(--accent-yellow);
            font-weight: bold;
        }

        .value-badge {
            padding: 5px 8px;
            border-radius: 6px;
            font-weight: 900;
            font-size: 0.7rem;
        }
        .positive-value { background: rgba(81, 207, 102, 0.2); color: var(--accent-green); }
        .negative-value { background: rgba(255, 107, 107, 0.1); color: var(--accent-red); }

        .btn-send-bet {
            background: var(--accent-green);
            color: var(--bg-dark);
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.7rem;
            cursor: pointer;
            display: none;
        }

        .btn-open-match {
            background: var(--primary);
            color: var(--bg-dark);
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.7rem;
            cursor: pointer;
            display: inline-block;
        }

        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 14, 20, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #multiAnalysisPanel { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #betToast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-green);
            color: var(--bg-dark);
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 0.8rem;
            display: none;
            z-index: 2000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <p style="margin-top: 15px; font-weight: 800; color: var(--primary);">ANALIZANDO DATOS...</p>
</div>

<div id="betToast">🚀 APUESTA ENVIADA (STAKE 1)</div>

<div class="container">
    <h1>BETA<span>GS</span> ANALYTICS</h1>
    
    <div class="nav-header">
        <a href="roi2.html" class="btn-nav-roi"><span>🧮</span> ROI CALC</a>
        <a href="xg.html" class="btn-nav-xg"><span>⚽</span> XG ANALYTICS</a>
    </div>

    <div class="section-title"><span>⚙️</span> CONTROL DE DATOS</div>
    <div class="card">
        <div class="input-grid">
            <div style="display: flex; gap: 10px;">
                <select id="leagueSelect"></select>
                <button class="btn-nav-roi" onclick="borrarLigaSeleccionada()" style="border-color: var(--accent-red); color: var(--accent-red);">🗑️</button>
            </div>
            
            <div style="display: flex; gap: 8px;">
                <input type="text" id="newSheetName" placeholder="AÑADIR HOJA (Ej: PREMIER)...">
                <button class="btn-nav-xg" onclick="agregarNuevaLiga()" style="white-space: nowrap;">+ AÑADIR</button>
            </div>

            <button class="btn-analyze-master" onclick="analizarTodoMultiliga()">
                🚀 ANALIZAR TODAS LAS LIGAS
            </button>
        </div>
    </div>

    <div id="multiAnalysisPanel">
        <div class="section-title"><span>🌍</span> PARTIDOS DETECTADOS</div>
        <div class="card" style="padding: 10px;">
            <div class="table-wrapper">
                <table class="multi-results-table">
                    <thead>
                        <tr>
                            <th>LIGA</th>
                            <th>PARTIDO</th>
                            <th>PROM GF (L/V)</th>
                            <th>xG L</th>
                            <th>xG V</th>
                            <th>ANALISIS (Poisson)</th>
                        </tr>
                    </thead>
                    <tbody id="multiResultsBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const SHEETS_ID = '1lmUPv7SP0XYi9ns4jkj3RTCScxIN2pCfBJyMUp_kNRI';
    let matchesToday = [];

    // --- GESTIÓN DE LIGAS ---
    function getLeagues() {
        const saved = localStorage.getItem('betags_custom_leagues');
        return saved ? JSON.parse(saved) : [];
    }

    function renderLeagueSelect() {
        const select = document.getElementById('leagueSelect');
        const leagues = getLeagues();
        if (leagues.length === 0) {
            select.innerHTML = '<option value="">SIN HOJAS CARGADAS</option>';
            return;
        }
        select.innerHTML = leagues.map(l => `<option value="${l.sheet}">${l.name}</option>`).join('');
    }

    function agregarNuevaLiga() {
        const name = document.getElementById('newSheetName').value.trim().toUpperCase();
        if (!name) return;
        const leagues = getLeagues();
        if (leagues.some(l => l.sheet === name)) return alert("Esta hoja ya está en la lista.");
        leagues.push({name, sheet: name});
        localStorage.setItem('betags_custom_leagues', JSON.stringify(leagues));
        document.getElementById('newSheetName').value = "";
        renderLeagueSelect();
    }

    function borrarLigaSeleccionada() {
        const val = document.getElementById('leagueSelect').value;
        if(!val) return;
        let leagues = getLeagues().filter(l => l.sheet !== val);
        localStorage.setItem('betags_custom_leagues', JSON.stringify(leagues));
        renderLeagueSelect();
    }

    // --- CARGA Y ANÁLISIS ---
    async function fetchDataForSheet(sheetName) {
        const url = `https://docs.google.com/spreadsheets/d/${SHEETS_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&range=A1:W60`;
        try {
            const res = await fetch(url);
            if (!res.ok) return null;
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
            
            let equipos = {};
            rows.forEach((cols, i) => {
                if (i > 0 && cols[1] && !isNaN(parseFloat(cols[2]))) {
                    // Equipos Locales
                    equipos[cols[1].toUpperCase()] = {
                        gfProm: parseFloat(cols[6]) / parseFloat(cols[2])
                    };
                    // Equipos Visitantes
                    equipos[cols[13].toUpperCase()] = {
                        gfProm: parseFloat(cols[18]) / parseFloat(cols[14])
                    };
                }
            });
            return equipos;
        } catch (e) { return null; }
    }

    async function analizarTodoMultiliga() {
        const loader = document.getElementById('loadingOverlay');
        loader.style.display = 'flex';
        
        const leagues = getLeagues();
        if(leagues.length === 0) {
            alert("No hay hojas configuradas.");
            loader.style.display = 'none';
            return;
        }

        matchesToday = [];

        try {
            // 1. Obtener partidos del día
            const url = `https://docs.google.com/spreadsheets/d/${SHEETS_ID}/gviz/tq?tqx=out:csv&sheet=PARTIDOS+DEL+DIA&range=D1:F1000`;
            const res = await fetch(url);
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));

            // 2. Procesar cada liga configurada para obtener promedios
            for (let l of leagues) {
                const equiposData = await fetchDataForSheet(l.sheet);
                if (!equiposData) continue;

                // 3. Cruzar partidos del día con datos de la liga
                rows.forEach(cols => {
                    const home = cols[0];
                    const away = cols[2];
                    if (!home || home === "LOCAL" || !equiposData[home.toUpperCase()] || !equiposData[away.toUpperCase()]) return;

                    matchesToday.push({
                        league: l.name,
                        home, away,
                        gfPromL: equiposData[home.toUpperCase()].gfProm,
                        gfPromV: equiposData[away.toUpperCase()].gfProm
                    });
                });
            }

            renderMultiTable();
            document.getElementById('multiAnalysisPanel').style.display = 'block';

        } catch (e) { alert("Error de conexión."); } finally { loader.style.display = 'none'; }
    }

    function renderMultiTable() {
        const body = document.getElementById('multiResultsBody');
        if(matchesToday.length === 0) {
            body.innerHTML = '<tr><td colspan="6">No hay partidos detectados en las ligas configuradas.</td></tr>';
            return;
        }
        body.innerHTML = matchesToday.map((m, i) => {
            return `
            <tr>
                <td><span class="league-tag">${m.league}</span></td>
                <td style="font-weight:bold">${m.home} <br>vs<br> ${m.away}</td>
                <td>${m.gfPromL.toFixed(2)} / ${m.gfPromV.toFixed(2)}</td>
                <td><input type="number" class="input-odds" style="width:50px" id="xg_l_${i}" step="0.1"></td>
                <td><input type="number" class="input-odds" style="width:50px" id="xg_v_${i}" step="0.1"></td>
                <td>
                    <button class="btn-open-match" onclick="analizarPoisson(${i})">ANALIZAR</button>
                </td>
            </tr>`;
        }).join('');
    }

    // --- ANÁLISIS POISSON Y DELTA ---
    function analizarPoisson(idx) {
        const xGL = parseFloat(document.getElementById(`xg_l_${idx}`).value);
        const xGV = parseFloat(document.getElementById(`xg_v_${idx}`).value);
        if(isNaN(xGL) || isNaN(xGV)) return alert("Introduce xG válidos");

        const m = matchesToday[idx];
        const deltaL = m.gfPromL - xGL;
        const deltaV = m.gfPromV - xGV;

        // Aquí redirigimos a roi2 o mostramos resultado de poisson
        // Para este requerimiento, calcularemos las probabilidades y las mostraremos
        // (En una implementacion real, esto abriria el panel de detalles)
        
        let u25 = 0;
        for(let i=0; i<=6; i++){
            for(let j=0; j<=6; j++){
                if(i+j <= 2) u25 += (Math.pow(xGL, i) * Math.exp(-xGL) / factorial(i)) * (Math.pow(xGV, j) * Math.exp(-xGV) / factorial(j));
            }
        }

        alert(`Analisis ${m.home} vs ${m.away}\n` +
              `Delta Local: ${deltaL.toFixed(2)}\n` +
              `Delta Visita: ${deltaV.toFixed(2)}\n` +
              `Prob Under 2.5: ${(u25*100).toFixed(0)}%`);
        
        // Enviar a roi2 como parte de la funcionalidad mantenida
        enviarARoi2(m, xGL, xGV, deltaL, deltaV);
    }

    function factorial(n) {
        if (n === 0) return 1;
        let r = 1; for (let i = 2; i <= n; i++) r *= i; return r;
    }

    function enviarARoi2(match, xgl, xgv, dl, dv) {
        // Logica para guardar en localStorage para ROI2
        const bet = {
            date: new Date().toLocaleDateString(),
            match: `${match.home} vs ${match.away}`,
            xgl: xgl,
            xgv: xgv,
            deltaL: dl.toFixed(2),
            deltaV: dv.toFixed(2)
        };
        let historial = JSON.parse(localStorage.getItem('roi2_historial')) || [];
        historial.push(bet);
        localStorage.setItem('roi2_historial', JSON.stringify(historial));
        
        const toast = document.getElementById('betToast');
        toast.innerText = "💾 DATOS ENVIADOS A ROI2";
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    window.onload = () => { renderLeagueSelect(); };
</script>
</body>
</html>
