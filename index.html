<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BETAGS - Deep Analytics Pro</title>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-card: #151921;
            --primary: #4dabf7;
            --accent-green: #51cf66;
            --accent-red: #ff6b6b;
            --accent-yellow: #fcc419;
            --text-white: #e9ecef;
            --text-muted: #adb5bd;
            --border: #2c3440;
            --glass: rgba(255, 255, 255, 0.03);
            --row-select: rgba(77, 171, 247, 0.15); 
            --gold-glow: 0 0 15px rgba(252, 196, 25, 0.4);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-white);
            margin: 0;
            padding: 0;
            display: flex; 
            justify-content: center;
            min-height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 800px; 
            padding: 20px; 
            box-sizing: border-box;
            padding-bottom: 60px;
        }

        h1 { font-size: 1.6rem; color: var(--primary); text-align: center; margin: 25px 0; letter-spacing: 4px; font-weight: 900; }
        h1 span { color: var(--text-white); }

        .nav-header {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .btn-nav-roi, .btn-nav-xg {
            background: var(--glass);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 18px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-nav-xg { border-color: var(--accent-green); color: var(--accent-green); }
        .btn-nav-roi:hover { background: var(--primary); color: var(--bg-dark); }

        .section-title { 
            font-size: 0.75rem; 
            color: var(--primary); 
            text-transform: uppercase; 
            margin: 20px 0 12px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-weight: 800; 
            letter-spacing: 1px;
        }
        
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .input-grid { width: 100%; display: grid; grid-template-columns: 1fr; gap: 15px; }
        
        select, input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            background: #0b0e14;
            color: white;
            font-size: 0.9rem;
            outline: none;
            box-sizing: border-box;
        }

        .btn-analyze-master {
            width: 100%;
            background: linear-gradient(135deg, #4dabf7, #228be6);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(34, 139, 230, 0.4);
        }

        .multi-results-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
            margin-top: 10px;
        }
        .multi-results-table th {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            text-align: center;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border);
        }
        .multi-results-table td {
            padding: 10px 5px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .row-active {
            background-color: var(--row-select) !important;
            border-left: 4px solid var(--primary);
        }

        .league-tag {
            background: #000000;
            color: #ffffff;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 0.6rem;
            border: 1px solid var(--border);
        }

        .score-badge {
            background: var(--accent-yellow);
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 0.7rem;
            margin: 0 4px;
        }

        .input-xg-manual {
            width: 50px;
            padding: 6px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid var(--primary);
            background: #0b0e14;
            color: var(--primary);
            font-weight: bold;
            font-size: 0.7rem;
        }

        .probs-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .summary-box { 
            background: var(--glass);
            border-radius: 14px; 
            padding: 15px 5px; 
            text-align: center;
            border: 1px solid var(--border);
        }
        .summary-box.blue { border-top: 3px solid var(--primary); }
        .summary-box.green { border-top: 3px solid var(--accent-green); }
        .summary-box.yellow { border-top: 3px solid var(--accent-yellow); }

        .summary-val { font-size: 1.2rem; font-weight: 900; margin: 5px 0; }
        .summary-odds { font-size: 0.65rem; color: var(--accent-green); font-family: monospace; }

        .table-wrapper { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { font-size: 0.65rem; text-transform: uppercase; color: var(--text-muted); padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 10px 5px; border-bottom: 1px solid var(--border); font-size: 0.8rem; text-align: center;}

        .input-odds {
            width: 55px;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border);
            background: #0b0e14;
            color: var(--accent-yellow);
            font-weight: bold;
        }

        .value-badge {
            padding: 5px 8px;
            border-radius: 6px;
            font-weight: 900;
            font-size: 0.7rem;
        }
        .positive-value { background: rgba(81, 207, 102, 0.2); color: var(--accent-green); }
        .negative-value { background: rgba(255, 107, 107, 0.1); color: var(--accent-red); }

        .btn-send-bet {
            background: var(--accent-green);
            color: var(--bg-dark);
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.7rem;
            cursor: pointer;
            display: none;
        }

        .btn-pulse {
            animation: pulse-green 1.5s infinite;
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(81, 207, 102, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(81, 207, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(81, 207, 102, 0); }
        }

        .btn-open-match {
            background: var(--primary);
            color: var(--bg-dark);
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.7rem;
            cursor: pointer;
            display: inline-block;
        }

        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 14, 20, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #multiAnalysisPanel, #singleAnalysisPanel { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #betToast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-green);
            color: var(--bg-dark);
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 0.8rem;
            display: none;
            z-index: 2000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <p style="margin-top: 15px; font-weight: 800; color: var(--primary);">CARGANDO DATOS...</p>
</div>

<div id="betToast">🚀 APUESTA ENVIADA (STAKE 1)</div>

<div class="container">
    <h1>BETA<span>GS</span> ANALYTICS</h1>
    
    <div class="nav-header">
        <a href="roi2.html" class="btn-nav-roi"><span>🧮</span> ROI CALC</a>
    </div>

    <div class="section-title"><span>⚙️</span> CONTROL DE DATOS</div>
    <div class="card">
        <div class="input-grid">
            <div style="display: flex; gap: 10px;">
                <select id="leagueSelect"></select>
                <button class="btn-nav-roi" onclick="borrarLigaSeleccionada()" style="border-color: var(--accent-red); color: var(--accent-red);">🗑️</button>
            </div>
            
            <div style="display: flex; gap: 8px;">
                <input type="text" id="newSheetName" placeholder="AÑADIR HOJA (Ej: PREMIER)...">
                <button class="btn-nav-xg" onclick="agregarNuevaLiga()" style="white-space: nowrap;">+ AÑADIR</button>
            </div>

            <button class="btn-analyze-master" onclick="analizarTodoMultiliga()">
                🔍 CARGAR PARTIDOS Y PROMEDIOS
            </button>
        </div>
    </div>
    
    <div class="section-title"><span>🔬</span> CALCULADORA MANUAL DE xG</div>
    <div class="card">
        <div class="input-grid" style="grid-template-columns: repeat(4, 1fr); gap: 10px;">
            <input type="number" id="calc_xg_l" placeholder="xG Loc" step="0.1">
            <input type="number" id="calc_gf_l" placeholder="GF Loc" step="1">
            <input type="number" id="calc_xg_v" placeholder="xG Vis" step="0.1">
            <input type="number" id="calc_gf_v" placeholder="GF Vis" step="1">
        </div>
        <button class="btn-nav-xg" onclick="calcularManual()" style="width: 100%; margin-top: 15px; justify-content: center;">
            CALCULAR MANUAL
        </button>
        
        <div id="manualResultPanel" style="display:none; margin-top:15px; padding-top:15px; border-top: 1px solid var(--border);">
            <div style="display: flex; justify-content: space-around; text-align: center; font-size: 0.8rem;">
                <div>Delta Local: <span id="res_delta_l" style="font-weight:bold;"></span></div>
                <div>Delta Visita: <span id="res_delta_v" style="font-weight:bold;"></span></div>
            </div>
            <div style="text-align: center; font-size: 1.2rem; margin: 10px 0; font-weight: 900;">
                Tendencia: <span id="res_trend"></span>
            </div>
            <div class="probs-summary" style="margin-top:10px;">
                <div class="summary-box blue">
                    <div style="font-size: 0.55rem; font-weight: 800;">O2.5</div>
                    <div class="summary-val" id="res_o25" style="font-size:1rem;">0%</div>
                </div>
                <div class="summary-box green">
                    <div style="font-size: 0.55rem; font-weight: 800;">BTTS</div>
                    <div class="summary-val" id="res_btts" style="font-size:1rem;">0%</div>
                </div>
                <div class="summary-box yellow">
                    <div style="font-size: 0.55rem; font-weight: 800;">O0.5 HT</div>
                    <div class="summary-val" id="res_o05ht" style="font-size:1rem;">0%</div>
                </div>
            </div>
        </div>
    </div>

    <div id="multiAnalysisPanel">
        <div class="section-title"><span>🌍</span> PARTIDOS DETECTADOS</div>
        <div class="card" style="padding: 10px;">
            <div class="table-wrapper">
                <table class="multi-results-table">
                    <thead>
                        <tr>
                            <th>PARTIDO / RES</th>
                            <th>AVG GF (L/V)</th>
                            <th>xG MANUAL (L/V)</th>
                            <th>ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="multiResultsBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const SHEETS_ID = '1lmUPv7SP0XYi9ns4jkj3RTCScxIN2pCfBJyMUp_kNRI';
    let matchesToday = [];

    // --- GESTIÓN DE LIGAS ---
    function getLeagues() {
        const saved = localStorage.getItem('betags_custom_leagues');
        return saved ? JSON.parse(saved) : [];
    }

    function renderLeagueSelect() {
        const select = document.getElementById('leagueSelect');
        const leagues = getLeagues();
        if (leagues.length === 0) {
            select.innerHTML = '<option value="">SIN HOJAS CARGADAS</option>';
            return;
        }
        leagues.sort((a,b) => a.name.localeCompare(b.name));
        select.innerHTML = leagues.map(l => `<option value="${l.sheet}">${l.name}</option>`).join('');
    }

    function agregarNuevaLiga() {
        const name = document.getElementById('newSheetName').value.trim().toUpperCase();
        if (!name) return;
        const leagues = getLeagues();
        if (leagues.some(l => l.sheet === name)) return alert("Esta hoja ya está en la lista.");
        leagues.push({name, sheet: name});
        localStorage.setItem('betags_custom_leagues', JSON.stringify(leagues));
        document.getElementById('newSheetName').value = "";
        renderLeagueSelect();
    }

    function borrarLigaSeleccionada() {
        const val = document.getElementById('leagueSelect').value;
        if(!val) return;
        let leagues = getLeagues().filter(l => l.sheet !== val);
        localStorage.setItem('betags_custom_leagues', JSON.stringify(leagues));
        renderLeagueSelect();
    }

    // --- MATEMÁTICAS ---
    function poisson(k, lambda) {
        if(lambda <= 0) return k === 0 ? 1 : 0;
        return (Math.exp(-lambda) * Math.pow(lambda, k)) / factorial(k);
    }
    function factorial(n) {
        let r = 1; for (let i = 2; i <= n; i++) r *= i; return r;
    }

    // --- MEJORA: LÓGICA CALCULADORA MANUAL ---
    function calcularManual() {
        const xG_L = parseFloat(document.getElementById('calc_xg_l').value);
        const GF_L = parseFloat(document.getElementById('calc_gf_l').value);
        const xG_V = parseFloat(document.getElementById('calc_xg_v').value);
        const GF_V = parseFloat(document.getElementById('calc_gf_v').value);

        if(isNaN(xG_L) || isNaN(GF_L) || isNaN(xG_V) || isNaN(GF_V)) {
            return alert("Por favor rellena todos los campos con números válidos.");
        }

        const deltaL = GF_L - xG_L;
        const deltaV = GF_V - xG_V;

        document.getElementById('res_delta_l').innerText = deltaL.toFixed(2);
        document.getElementById('res_delta_v').innerText = deltaV.toFixed(2);
        document.getElementById('res_delta_l').style.color = deltaL > 0.3 ? 'var(--accent-red)' : (deltaL < -0.3 ? 'var(--accent-green)' : 'white');
        document.getElementById('res_delta_v').style.color = deltaV > 0.3 ? 'var(--accent-red)' : (deltaV < -0.3 ? 'var(--accent-green)' : 'white');

        // Cálculo de probs usando los xG ingresados directamente
        let u25Poisson = 0;
        let pL = [], pV = [];
        for(let i=0; i<=6; i++){ pL[i]=poisson(i, xG_L); pV[i]=poisson(i, xG_V); }
        for(let i=0; i<=6; i++) for(let j=0; j<=6; j++) if(i+j <= 2) u25Poisson += pL[i]*pV[j];
        
        const ov25_Final = (1 - u25Poisson);
        const btts_Final = (1 - (pL[0] + pV[0] - (pL[0]*pV[0])));
        const probHT = 1 - Math.exp(-(xG_L + xG_V) * 0.45);

        document.getElementById('res_o25').innerText = (ov25_Final * 100).toFixed(0) + '%';
        document.getElementById('res_btts').innerText = (btts_Final * 100).toFixed(0) + '%';
        document.getElementById('res_o05ht').innerText = (probHT * 100).toFixed(0) + '%';
        document.getElementById('manualResultPanel').style.display = 'block';
    }

    // --- CARGA DE DATOS ---
    async function fetchDataForSheet(sheetName) {
        const url = `https://docs.google.com/spreadsheets/d/${SHEETS_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&range=A1:W60`;
        try {
            const res = await fetch(url);
            if (!res.ok) return null;
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
            
            let equipos = {};
            rows.forEach((cols, i) => {
                if (i > 0 && cols[1] && !isNaN(parseFloat(cols[2]))) {
                    equipos[cols[1].toUpperCase()] = { 
                        gp: parseFloat(cols[2]), 
                        gf: parseFloat(cols[6])
                    };
                    equipos[cols[13].toUpperCase()] = { 
                        gp: parseFloat(cols[14]), 
                        gf: parseFloat(cols[18])
                    };
                }
            });
            return equipos;
        } catch (e) { return null; }
    }

    async function analizarTodoMultiliga() {
        const loader = document.getElementById('loadingOverlay');
        const selectedLeague = document.getElementById('leagueSelect').value;
        if(!selectedLeague) return alert("Selecciona una hoja de liga primero.");
        
        loader.style.display = 'flex';
        matchesToday = [];

        const teamData = await fetchDataForSheet(selectedLeague);
        
        try {
            const url = `https://docs.google.com/spreadsheets/d/${SHEETS_ID}/gviz/tq?tqx=out:csv&sheet=PARTIDOS+DEL+DIA&range=D1:F1000`;
            const res = await fetch(url);
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));

            rows.forEach(cols => {
                const home = cols[0];
                const away = cols[2];
                const score = cols[1];

                if (!home || home === "LOCAL" || !teamData[home.toUpperCase()] || !teamData[away.toUpperCase()]) return;
                
                const dataL = teamData[home.toUpperCase()];
                const dataV = teamData[away.toUpperCase()];

                matchesToday.push({
                    home, away, score,
                    avgL: (dataL.gf / dataL.gp).toFixed(2),
                    avgV: (dataV.gf / dataV.gp).toFixed(2)
                });
            });

            renderMultiTable();
            document.getElementById('multiAnalysisPanel').style.display = 'block';

        } catch (e) { alert("Error de conexión."); } finally { loader.style.display = 'none'; }
    }

    function renderMultiTable() {
        const body = document.getElementById('multiResultsBody');
        if(matchesToday.length === 0) {
            body.innerHTML = '<tr><td colspan="4">No hay partidos detectados para esta liga.</td></tr>';
            return;
        }
        body.innerHTML = matchesToday.map((m, i) => {
            const displayScore = (m.score && m.score !== "" && m.score !== "vs") ? `<span class="score-badge">${m.score}</span>` : " vs ";
            
            return `
            <tr>
                <td style="font-weight:bold">${m.home} ${displayScore} ${m.away}</td>
                <td><span style="color:var(--primary)">${m.avgL}</span> / <span style="color:var(--accent-green)">${m.avgV}</span></td>
                <td>
                    <div style="display:flex; gap:5px; justify-content:center;">
                        <input type="number" id="xg_l_${i}" class="input-xg-manual" placeholder="L">
                        <input type="number" id="xg_v_${i}" class="input-xg-manual" placeholder="V">
                    </div>
                </td>
                <td><button class="btn-open-match" onclick="enviarAnalisis(${i})">📊 ANALIZAR</button></td>
            </tr>`;
        }).join('');
    }

    function enviarAnalisis(idx) {
        const xGL = parseFloat(document.getElementById(`xg_l_${idx}`).value);
        const xGV = parseFloat(document.getElementById(`xg_v_${idx}`).value);

        if(isNaN(xGL) || isNaN(xGV)) {
            return alert("Por favor ingresa ambos xG manualmente.");
        }

        // --- ENVIAR A ROI2 ---
        const pick = { 
            id: Date.now(), 
            date: new Date().toLocaleString(), 
            teams: matchesToday[idx].home + " vs " + matchesToday[idx].away, 
            market: "Analisis Manual", 
            xGL: xGL, 
            xGV: xGV,
            status: 'pending' 
        };
        
        let historial = JSON.parse(localStorage.getItem('betags_roi2')) || [];
        historial.push(pick);
        localStorage.setItem('betags_roi2', JSON.stringify(historial));
        
        const toast = document.getElementById('betToast');
        toast.innerText = "📊 ANÁLISIS ENVIADO A ROI";
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2500);
    }

    window.onload = () => { renderLeagueSelect(); };
</script>
</body>
</html>
