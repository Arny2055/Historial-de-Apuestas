<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BETAGS - Data Parser Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-card: #151921;
            --primary: #4dabf7;
            --accent-green: #51cf66;
            --accent-yellow: #fcc419;
            --text-white: #e9ecef;
            --text-muted: #adb5bd;
            --border: #2c3440;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-white); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; }
        
        .card { background: var(--bg-card); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h1 { color: var(--primary); text-align: center; letter-spacing: 2px; font-weight: 900; margin-bottom: 5px; }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-bottom: 25px; display: block; }

        .section-title { font-size: 0.7rem; color: var(--primary); text-transform: uppercase; font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        
        textarea { width: 100%; height: 120px; background: #0b0e14; border: 1px solid var(--border); border-radius: 10px; color: #51cf66; font-family: monospace; font-size: 0.75rem; padding: 10px; box-sizing: border-box; resize: none; }
        
        .selector-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        select { width: 100%; padding: 12px; border-radius: 8px; background: #0b0e14; color: white; border: 1px solid var(--border); outline: none; }
        
        .btn { width: 100%; background: linear-gradient(135deg, #4dabf7, #228be6); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(77, 171, 247, 0.4); }

        .stats-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 15px; }
        .stat-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; border: 1px solid var(--border); text-align: center; }
        .stat-item label { font-size: 0.6rem; color: var(--text-muted); display: block; }
        .stat-item b { color: var(--accent-yellow); font-size: 1rem; }

        #results { display: none; }
        .prob-card { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .prob-box { background: var(--bg-dark); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .prob-box .val { font-size: 1.4rem; font-weight: 900; color: var(--primary); display: block; }
        
        .chart-container { height: 250px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>BETA<span>GS</span> ENGINE</h1>
    <span class="subtitle">Análisis basado en Forma Reciente (Last 10 Matches)</span>

    <div class="card">
        <div class="section-title"><span>📂</span> 1. PEGA LA TABLA DE LOCALES (FORM HOME)</div>
        <textarea id="homeTableInput" placeholder="Pega aquí la tabla de local..."></textarea>
        
        <div class="section-title" style="margin-top: 20px;"><span>📂</span> 2. PEGA LA TABLA DE VISITANTES (FORM AWAY)</div>
        <textarea id="awayTableInput" placeholder="Pega aquí la tabla de visita..."></textarea>

        <button class="btn" onclick="parseTables()">1. PROCESAR TABLAS</button>
    </div>

    <div id="selectionArea" class="card" style="display:none;">
        <div class="section-title"><span>⚔️</span> 3. SELECCIONA EL ENCUENTRO</div>
        <div class="selector-grid">
            <div>
                <label>EQUIPO LOCAL</label>
                <select id="selectHome"></select>
            </div>
            <div>
                <label>EQUIPO VISITANTE</label>
                <select id="selectAway"></select>
            </div>
        </div>
        <button class="btn" style="background: var(--accent-green); color: black;" onclick="calculatePoisson()">2. CALCULAR PROBABILIDADES</button>
    </div>

    <div id="results" class="card">
        <div class="section-title"><span>📊</span> RESULTADOS DEL PRONÓSTICO</div>
        <div id="matchTitle" style="text-align: center; font-weight: 800; font-size: 1.2rem; margin-bottom: 15px;"></div>
        
        <div class="stats-summary">
            <div class="stat-item"><label>Exp. Goals (λ)</label><b id="resExpG">0.00</b></div>
            <div class="stat-item"><label>Fuerza Ataque L</label><b id="resFAL">0.00</b></div>
            <div class="stat-item"><label>Fuerza Defensa V</label><b id="resFDV">0.00</b></div>
        </div>

        <div class="prob-card">
            <div class="prob-box"><span>Local</span><span class="val" id="pWinL">0%</span></div>
            <div class="prob-box"><span>Empate</span><span class="val" id="pDraw">0%</span></div>
            <div class="prob-box"><span>Visita</span><span class="val" id="pWinV">0%</span></div>
        </div>

        <div class="prob-card">
            <div class="prob-box"><span>Over 2.5</span><span class="val" id="pO25">0%</span></div>
            <div class="prob-box"><span>Ambos Marcan</span><span class="val" id="pBTTS">0%</span></div>
            <div class="prob-box"><span>Under 2.5</span><span class="val" id="pU25">0%</span></div>
        </div>

        <div class="chart-container">
            <canvas id="poissonChart"></canvas>
        </div>
    </div>
</div>

<script>
let homeData = [], awayData = [];
let avgLeagueGF_Home = 0, avgLeagueGF_Away = 0;
let chartInstance = null;

function parseTable(text) {
    const lines = text.trim().split('\n');
    const teams = [];
    lines.forEach(line => {
        // Regex para capturar Nombre Equipo, GP, W, D, L, GF, GA
        // Asumiendo que el nombre puede tener espacios y luego siguen números
        const match = line.match(/^\d+\s+([A-Za-z\s\.]+?)\s+(\d+)\s+\d+\s+\d+\s+\d+\s+(\d+)\s+(\d+)/);
        if (match) {
            teams.push({
                name: match[1].trim(),
                gp: parseInt(match[2]),
                gf: parseInt(match[3]),
                ga: parseInt(match[4]),
                avgGF: parseInt(match[3]) / parseInt(match[2]),
                avgGA: parseInt(match[4]) / parseInt(match[2])
            });
        }
    });
    return teams;
}

function parseTables() {
    homeData = parseTable(document.getElementById('homeTableInput').value);
    awayData = parseTable(document.getElementById('awayTableInput').value);

    if (homeData.length === 0 || awayData.length === 0) {
        alert("No se pudo leer la tabla. Asegúrate de copiar el formato correctamente.");
        return;
    }

    // Calcular promedios de liga (Base)
    avgLeagueGF_Home = homeData.reduce((sum, t) => sum + t.avgGF, 0) / homeData.length;
    avgLeagueGF_Away = awayData.reduce((sum, t) => sum + t.avgGF, 0) / awayData.length;

    // Llenar selectores
    const sH = document.getElementById('selectHome');
    const sV = document.getElementById('selectAway');
    sH.innerHTML = ""; sV.innerHTML = "";

    homeData.forEach(t => sH.add(new Option(t.name, t.name)));
    awayData.forEach(t => sV.add(new Option(t.name, t.name)));

    document.getElementById('selectionArea').style.display = 'block';
    window.scrollTo({ top: document.getElementById('selectionArea').offsetTop, behavior: 'smooth' });
}

function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }
function poisson(k, lambda) { return (Math.exp(-lambda) * Math.pow(lambda, k)) / factorial(k); }

function calculatePoisson() {
    const homeTeam = homeData.find(t => t.name === document.getElementById('selectHome').value);
    const awayTeam = awayData.find(t => t.name === document.getElementById('selectAway').value);

    // FÓRMULAS PROFESIONALES
    // FA = Goles Equipo / Goles Promedio Liga
    const FA_L = homeTeam.avgGF / avgLeagueGF_Home;
    const FD_L = homeTeam.avgGA / avgLeagueGF_Away;
    
    const FA_V = awayTeam.avgGF / avgLeagueGF_Away;
    const FD_V = awayTeam.avgGA / avgLeagueGF_Home;

    // Lambda (xG esperado)
    const lambdaL = FA_L * FD_V * avgLeagueGF_Home;
    const lambdaV = FA_V * FD_L * avgLeagueGF_Away;

    // Matriz de Probabilidades
    let pL = 0, pV = 0, pX = 0, pO25 = 0, pBTTS = 0;
    let probL = [], probV = [];

    for (let i = 0; i <= 8; i++) {
        probL[i] = poisson(i, lambdaL);
        probV[i] = poisson(i, lambdaV);
    }

    for (let i = 0; i <= 8; i++) {
        for (let j = 0; j <= 8; j++) {
            let p = probL[i] * probV[j];
            if (i > j) pL += p;
            else if (i < j) pV += p;
            else pX += p;

            if (i + j > 2.5) pO25 += p;
            if (i > 0 && j > 0) pBTTS += p;
        }
    }

    // Actualizar UI
    document.getElementById('matchTitle').innerText = `${homeTeam.name} vs ${awayTeam.name}`;
    document.getElementById('resExpG').innerText = (lambdaL + lambdaV).toFixed(2);
    document.getElementById('resFAL').innerText = FA_L.toFixed(2);
    document.getElementById('resFDV').innerText = FD_V.toFixed(2);
    
    document.getElementById('pWinL').innerText = (pL * 100).toFixed(1) + "%";
    document.getElementById('pWinV').innerText = (pV * 100).toFixed(1) + "%";
    document.getElementById('pDraw').innerText = (pX * 100).toFixed(1) + "%";
    document.getElementById('pO25').innerText = (pO25 * 100).toFixed(1) + "%";
    document.getElementById('pU25').innerText = ((1-pO25) * 100).toFixed(1) + "%";
    document.getElementById('pBTTS').innerText = (pBTTS * 100).toFixed(1) + "%";

    document.getElementById('results').style.display = 'block';
    renderChart(probL.slice(0,6), probV.slice(0,6));
    window.scrollTo({ top: document.getElementById('results').offsetTop, behavior: 'smooth' });
}

function renderChart(l, v) {
    const ctx = document.getElementById('poissonChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['0', '1', '2', '3', '4', '5'],
            datasets: [
                { label: 'Goles Local', data: l, backgroundColor: '#4dabf7' },
                { label: 'Goles Visita', data: v, backgroundColor: '#fcc419' }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: true, display: false }, x: { grid: { display: false } } }
        }
    });
}
</script>
</body>
</html>
