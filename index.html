<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APUESTASYSTEM - Dashboard CARTOON DARK</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@400;700&display=swap');

        :root {
            --primary: #FFD700;
            --accent: #FF5722;
            --success: #2ed573; 
            --danger: #ff4757;  
            --null: #eccc68;    
            --light: #f1f2f6;
            --dark-bg: #1e272e; /* Fondo oscuro principal */
            --card-bg: #2f3542; /* Fondo de tarjetas */
            --text-color: #ffffff;
            --border-width: 3px;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(#3d4852 2px, transparent 2px);
            background-size: 30px 30px;
            margin: 0;
            padding: 10px; 
            color: var(--text-color);
            overflow-x: hidden; 
        }

        .container {
            max-width: 1400px;
            margin: auto;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; 
            gap: 10px;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Bangers', cursive;
            font-size: clamp(2rem, 8vw, 4rem); 
            margin: 0;
            color: var(--primary);
            text-shadow: 4px 4px 0px #000;
            letter-spacing: 2px;
            -webkit-text-stroke: 1px #000;
        }

        /* Dashboard Stats */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px;
            margin-bottom: 30px;
        }

        @media (min-width: 768px) {
            .dashboard-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 20px;
            }
        }

        .stat-card {
            background: var(--card-bg);
            padding: 15px;
            border: var(--border-width) solid #000;
            border-radius: 15px;
            box-shadow: 5px 5px 0px #000;
            text-align: center;
        }

        .stat-card h3 {
            margin: 0;
            font-family: 'Bangers', cursive;
            font-size: 1rem;
            color: var(--primary);
            letter-spacing: 1px;
        }

        .stat-card p {
            margin: 5px 0 0;
            font-size: 1.2rem;
            font-weight: 900;
            color: #fff;
        }

        /* Input especial para el bank inicial */
        .bank-input {
            background: #000;
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 8px;
            padding: 5px;
            width: 100px;
            font-family: 'Open Sans', sans-serif;
            font-weight: bold;
            text-align: center;
            margin-top: 5px;
        }

        /* Formulario */
        .add-bet-form {
            background: #34495e;
            padding: 20px;
            border: var(--border-width) solid #000;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column; 
            gap: 15px;
            box-shadow: 6px 6px 0px #000;
        }

        @media (min-width: 768px) {
            .add-bet-form {
                flex-direction: row;
                flex-wrap: wrap;
                align-items: flex-end;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%; 
        }

        @media (min-width: 768px) {
            .input-group {
                width: auto;
                flex: 1;
            }
        }

        label {
            font-family: 'Bangers', cursive;
            font-size: 1rem;
            color: var(--primary);
        }

        input, select {
            padding: 10px;
            border: var(--border-width) solid #000;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box; 
            background: #fff;
            color: #000;
        }

        /* Tabla responsiva */
        .table-container {
            background: var(--card-bg);
            padding: 10px;
            border: var(--border-width) solid #000;
            border-radius: 20px;
            box-shadow: 8px 8px 0px #000;
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch; 
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1600px; /* Incrementado para acomodar la celda más grande */
        }

        th {
            background-color: var(--primary);
            padding: 12px;
            font-family: 'Bangers', cursive;
            border: var(--border-width) solid #000;
            color: #000;
            letter-spacing: 1px;
        }

        td {
            padding: 10px;
            border: 2px solid #000;
            font-weight: 700;
            font-size: 0.85rem;
            color: #fff;
        }

        /* Input ID y Partido en tabla */
        .id-edit-input, .match-edit-input {
            padding: 4px;
            border: 2px solid #000;
            border-radius: 5px;
            font-weight: bold;
            background: #fff;
            color: #000;
        }

        .id-edit-input {
            width: 60px;
            text-align: center;
        }

        /* Mejora: Celda de equipos 4 veces más grande */
        .match-edit-input {
            width: 100%;
            min-width: 600px; /* Tamaño ampliado significativamente */
            box-sizing: border-box;
            white-space: normal;
            word-wrap: break-word;
        }

        /* Botones */
        .btn {
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Bangers', cursive;
            font-size: 1.1rem;
            border: var(--border-width) solid #000;
            box-shadow: 4px 4px 0px #000;
            text-transform: uppercase;
            transition: transform 0.1s;
        }

        .btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }

        .btn-add { background: var(--success); width: 100%; color: #000; }
        @media (min-width: 768px) { .btn-add { width: auto; } }

        .btn-export { background: var(--accent); color: white; padding: 8px 15px; font-size: 0.9rem; }

        /* Colores de Resultado con texto oscuro para legibilidad */
        .res-w { background-color: var(--success) !important; color: #000 !important; }
        .res-l { background-color: var(--danger) !important; color: #000 !important; }
        .res-v { background-color: var(--null) !important; color: #000 !important; }
        
        /* Select dentro de la tabla */
        .res-select {
            border: none; 
            background: transparent; 
            font-weight: bold; 
            color: inherit;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h1>ApuestaSystem!</h1>
        <button class="btn btn-export" onclick="exportData()">💾 Exportar</button>
    </div>

    <div class="dashboard-grid">
        <div class="stat-card">
            <h3>Bank Inicial</h3>
            <input type="number" id="in-initial-bank" class="bank-input" step="10" onchange="updateInitialBank(this.value)">
        </div>
        <div class="stat-card">
            <h3>Bank Actual</h3>
            <p id="stat-bank">0,00 €</p>
        </div>
        <div class="stat-card">
            <h3>Apostado</h3>
            <p id="stat-invested">0,00 €</p>
        </div>
        <div class="stat-card">
            <h3>Apuestas</h3>
            <p id="stat-count">0</p>
        </div>
        <div class="stat-card">
            <h3>Cuota Media</h3>
            <p id="stat-odds">0,00</p>
        </div>
        <div class="stat-card" style="border-color: var(--success);">
            <h3>B. Neto</h3>
            <p id="stat-profit" style="color: var(--success);">0,00 €</p>
        </div>
        <div class="stat-card" style="border-color: var(--primary);">
            <h3>Yield</h3>
            <p id="stat-yield" style="color: var(--primary);">0%</p>
        </div>
    </div>

    <div class="add-bet-form">
        <div class="input-group">
            <label>Partido</label>
            <input type="text" id="in-match" placeholder="¿Quién juega?">
        </div>
        <div class="input-group">
            <label>Mercado</label>
            <input type="text" id="in-market" placeholder="Ej: Goles">
        </div>
        <div class="input-group">
            <label>Apuesta</label>
            <input type="text" id="in-bet-type" placeholder="Pronóstico">
        </div>
        <div class="input-group">
            <label>Stake %</label>
            <input type="number" id="in-stake" step="0.1" value="1">
        </div>
        <div class="input-group">
            <label>Cuota</label>
            <input type="number" id="in-odds" step="0.01" value="1.80">
        </div>
        <div class="input-group">
            <label>Resultado</label>
            <select id="in-res">
                <option value="PENDING">⌛ Pendiente</option>
                <option value="W">✅ Ganada</option>
                <option value="L">❌ Perdida</option>
                <option value="V">⚪ Nula</option>
            </select>
        </div>
        <button class="btn btn-add" onclick="addBet()">Añadir</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>FECHA</th>
                    <th>ID</th>
                    <th>PARTIDO</th>
                    <th>MERCADO</th>
                    <th>APUESTA</th>
                    <th>BANK</th>
                    <th>STAKE</th>
                    <th>€ INVERTIDO</th>
                    <th>CUOTA</th>
                    <th>POTENCIAL</th>
                    <th>UNIDADES</th>
                    <th>B. NETO</th>
                    <th>RESULTADO</th>
                    <th>ELIMINAR</th>
                </tr>
            </thead>
            <tbody id="bet-table-body">
            </tbody>
        </table>
    </div>
</div>

<script>
    let initialBank = parseFloat(localStorage.getItem('apuestaSystemInitialBank')) || 1000.00;
    document.getElementById('in-initial-bank').value = initialBank;

    let bets = JSON.parse(localStorage.getItem('apuestaSystemData')) || [
        { fecha: '7/4/2026', id: 1, partido: 'M. Liberia - San Carlos', mercado: 'Goles', apuesta: 'BTTs Yes', bankAtTime: 1000, stake: 1, cuota: 1.95, resultado: 'W' },
        { fecha: '7/4/2026', id: 2, partido: 'Sporting CP - Arsenal', mercado: 'Goles', apuesta: 'BTTs Yes', bankAtTime: 1000, stake: 1, cuota: 1.80, resultado: 'PENDING' }
    ];

    function updateInitialBank(val) {
        initialBank = parseFloat(val) || 0;
        localStorage.setItem('apuestaSystemInitialBank', initialBank);
        calculateStats();
    }

    function calculateStats() {
        let totalInvested = 0;
        let totalProfit = 0;
        let totalSettled = 0;
        let oddsSum = 0;
        let runningBank = initialBank;

        const tableBody = document.getElementById('bet-table-body');
        tableBody.innerHTML = '';

        bets.forEach((bet, index) => {
            bet.bankAtTime = runningBank;
            
            let amount = (bet.bankAtTime * (bet.stake / 100)); 
            let potential = amount * bet.cuota;
            let units = 0; 
            let netProfit = 0;
            let resClass = '';

            if (bet.resultado === 'W') {
                netProfit = potential - amount;
                units = (bet.cuota - 1) * bet.stake;
                resClass = 'res-w';
            } else if (bet.resultado === 'L') {
                netProfit = -amount;
                units = -bet.stake;
                resClass = 'res-l';
            } else if (bet.resultado === 'V') {
                netProfit = 0;
                units = 0;
                resClass = 'res-v';
            }

            totalInvested += amount;
            totalProfit += netProfit;
            oddsSum += bet.cuota;
            
            runningBank += netProfit;

            tableBody.innerHTML += `
                <tr>
                    <td>${bet.fecha}</td>
                    <td>
                        <input type="number" class="id-edit-input" value="${bet.id}" onchange="updateId(${index}, this.value)">
                    </td>
                    <td>
                        <input type="text" class="match-edit-input" value="${bet.partido}" onchange="updateMatch(${index}, this.value)">
                    </td>
                    <td>${bet.mercado || '-'}</td>
                    <td>${bet.apuesta || '-'}</td>
                    <td>${bet.bankAtTime.toFixed(2)} €</td>
                    <td>${bet.stake}%</td>
                    <td>${amount.toFixed(2)} €</td>
                    <td>${bet.cuota.toFixed(2)}</td>
                    <td>${potential.toFixed(2)} €</td>
                    <td>${units.toFixed(2)}</td>
                    <td class="${resClass}">${netProfit.toFixed(2)} €</td>
                    <td class="${resClass}">
                        <select class="res-select" onchange="updateResult(${index}, this.value)">
                            <option value="PENDING" ${bet.resultado === 'PENDING' ? 'selected' : ''}>PENDIENTE</option>
                            <option value="W" ${bet.resultado === 'W' ? 'selected' : ''}>WIN</option>
                            <option value="L" ${bet.resultado === 'L' ? 'selected' : ''}>LOSS</option>
                            <option value="V" ${bet.resultado === 'V' ? 'selected' : ''}>VOID</option>
                        </select>
                    </td>
                    <td>
                        <button onclick="deleteBet(${index})" style="background:#fff; border:1px solid #000; border-radius:5px; cursor:pointer; font-weight:bold;">X</button>
                    </td>
                </tr>
            `;
        });

        localStorage.setItem('apuestaSystemData', JSON.stringify(bets));

        document.getElementById('stat-bank').innerText = `${runningBank.toFixed(2)} €`;
        document.getElementById('stat-invested').innerText = `${totalInvested.toFixed(2)} €`;
        document.getElementById('stat-count').innerText = bets.length;
        document.getElementById('stat-odds').innerText = bets.length > 0 ? (oddsSum / bets.length).toFixed(2) : "0.00";
        document.getElementById('stat-profit').innerText = `${totalProfit.toFixed(2)} €`;
        
        let yieldVal = totalInvested > 0 ? (totalProfit / totalInvested) * 100 : 0;
        document.getElementById('stat-yield').innerText = `${yieldVal.toFixed(2)}%`;
    }

    function updateId(index, newVal) {
        bets[index].id = newVal;
        localStorage.setItem('apuestaSystemData', JSON.stringify(bets));
    }

    function updateMatch(index, newVal) {
        bets[index].partido = newVal;
        localStorage.setItem('apuestaSystemData', JSON.stringify(bets));
    }

    function addBet() {
        const match = document.getElementById('in-match').value;
        const market = document.getElementById('in-market').value;
        const betType = document.getElementById('in-bet-type').value;
        const stake = parseFloat(document.getElementById('in-stake').value);
        const odds = parseFloat(document.getElementById('in-odds').value);
        const res = document.getElementById('in-res').value;

        if(!match || isNaN(stake) || isNaN(odds)) return alert("¡Faltan datos!");

        let currentRunningBank = initialBank;
        bets.forEach(b => {
            let amt = (currentRunningBank * (b.stake / 100));
            if (b.resultado === 'W') currentRunningBank += (amt * b.cuota - amt);
            else if (b.resultado === 'L') currentRunningBank -= amt;
        });

        const newBet = {
            fecha: new Date().toLocaleDateString(),
            id: bets.length + 1,
            partido: match,
            mercado: market,
            apuesta: betType,
            bankAtTime: currentRunningBank,
            stake: stake,
            cuota: odds,
            resultado: res
        };

        bets.push(newBet);
        calculateStats();
        
        document.getElementById('in-match').value = '';
        document.getElementById('in-market').value = '';
        document.getElementById('in-bet-type').value = '';
    }

    function deleteBet(index) {
        if(confirm("¿Borrar apuesta?")) {
            bets.splice(index, 1);
            calculateStats();
        }
    }

    function updateResult(index, newRes) {
        bets[index].resultado = newRes;
        calculateStats();
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(bets));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "apuestas.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    calculateStats();
</script>

</body>
</html>
