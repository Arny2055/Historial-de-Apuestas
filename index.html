<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BETAGS - Professional Poisson</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-card: #151921;
            --primary: #4dabf7;
            --accent-green: #51cf66;
            --accent-yellow: #fcc419;
            --text-white: #e9ecef;
            --text-muted: #adb5bd;
            --border: #2c3440;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-white); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; }
        
        .card { background: var(--bg-card); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h1 { color: var(--primary); text-align: center; letter-spacing: 2px; font-weight: 900; }
        
        .section-title { font-size: 0.7rem; color: var(--primary); text-transform: uppercase; font-weight: 800; margin-bottom: 10px; display: block; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { display: block; font-size: 0.6rem; color: var(--text-muted); margin-bottom: 4px; font-weight: bold; }
        input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: #0b0e14; color: white; box-sizing: border-box; }
        
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn:hover { filter: brightness(1.2); }

        .res-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .res-box { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        .res-box span { display: block; font-size: 0.6rem; color: var(--text-muted); }
        .res-box b { font-size: 1.1rem; color: var(--accent-yellow); }

        .chart-area { height: 200px; margin-top: 20px; }
        .badge { background: var(--accent-green); color: black; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: 900; }
    </style>
</head>
<body>

<div class="container">
    <h1>BETA<span>GS</span> PRO 2026</h1>

    <div class="card">
        <span class="section-title">1. Promedios de la Liga (Referencia)</span>
        <div class="grid">
            <div><label>Goles Local Liga</label><input type="number" id="l_avgL" value="1.50" step="0.01"></div>
            <div><label>Goles Visita Liga</label><input type="number" id="l_avgV" value="1.20" step="0.01"></div>
        </div>

        <span class="section-title">2. Equipo Local (Últimos 5-8 partidos)</span>
        <div class="grid">
            <div><label>GF Local</label><input type="number" id="h_gf" placeholder="Ej: 2.1"></div>
            <div><label>GC Local</label><input type="number" id="h_gc" placeholder="Ej: 0.8"></div>
        </div>

        <span class="section-title">3. Equipo Visita (Últimos 5-8 partidos)</span>
        <div class="grid">
            <div><label>GF Visita</label><input type="number" id="a_gf" placeholder="Ej: 1.1"></div>
            <div><label>GC Visita</label><input type="number" id="a_gc" placeholder="Ej: 1.9"></div>
        </div>

        <button class="btn" onclick="analisisProfesional()">GENERAR PRONÓSTICO ELITE</button>
    </div>

    <div id="results" class="card" style="display:none;">
        <div style="text-align: center; margin-bottom: 15px;">
            <span class="badge">ANÁLISIS DE FUERZA COMPLETADO</span>
            <div id="matchDisplay" style="font-weight: 800; margin-top: 5px;"></div>
        </div>

        <div class="res-grid">
            <div class="res-box"><span id="nameH">Local</span><b id="probH">0%</b></div>
            <div class="res-box"><span>Empate</span><b id="probX">0%</b></div>
            <div class="res-box"><span id="nameA">Visita</span><b id="probA">0%</b></div>
        </div>

        <div class="res-grid" style="margin-top: 10px;">
            <div class="res-box"><span>Over 2.5</span><b id="probO25">0%</b></div>
            <div class="res-box"><span>Ambos Marcan</span><b id="probBTTS">0%</b></div>
            <div class="res-box"><span>Goles Exp.</span><b id="expG">0</b></div>
        </div>

        <div class="chart-area"><canvas id="goalsChart"></canvas></div>
    </div>
</div>

<script>
let chart = null;

function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }
function poisson(k, lambda) { return (Math.exp(-lambda) * Math.pow(lambda, k)) / factorial(k); }

function analisisProfesional() {
    // Datos Liga
    const avgLigaH = parseFloat(document.getElementById('l_avgL').value);
    const avgLigaV = parseFloat(document.getElementById('l_avgV').value);

    // Datos Equipos
    const gfH = parseFloat(document.getElementById('h_gf').value);
    const gcH = parseFloat(document.getElementById('h_gc').value);
    const gfV = parseFloat(document.getElementById('a_gf').value);
    const gcV = parseFloat(document.getElementById('a_gc').value);

    if ([gfH, gcH, gfV, gcV].some(isNaN)) return alert("Por favor ingresa los datos de los equipos.");

    // CÁLCULO PROFESIONAL: FUERZAS DE ATAQUE Y DEFENSA
    const ataqueH = gfH / avgLigaH;
    const defensaH = gcH / avgLigaV;
    const ataqueV = gfV / avgLigaV;
    const defensaV = gcV / avgLigaH;

    // DETERMINACIÓN DE LAMBDAS AJUSTADOS
    const lambdaH = ataqueH * defensaV * avgLigaH;
    const lambdaV = ataqueV * defensaH * avgLigaV;

    let pH = 0, pX = 0, pA = 0, pO25 = 0, pBTTS = 0;
    let matrixH = [], matrixV = [];

    for (let i = 0; i <= 8; i++) {
        matrixH[i] = poisson(i, lambdaH);
        matrixV[i] = poisson(i, lambdaV);
    }

    for (let i = 0; i <= 8; i++) {
        for (let j = 0; j <= 8; j++) {
            let prob = matrixH[i] * matrixV[j];
            if (i > j) pH += prob;
            else if (i === j) pX += prob;
            else pA += prob;

            if (i + j > 2.5) pO25 += prob;
            if (i > 0 && j > 0) pBTTS += prob;
        }
    }

    // UI Updates
    document.getElementById('probH').innerText = (pH * 100).toFixed(1) + "%";
    document.getElementById('probX').innerText = (pX * 100).toFixed(1) + "%";
    document.getElementById('probA').innerText = (pA * 100).toFixed(1) + "%";
    document.getElementById('probO25').innerText = (pO25 * 100).toFixed(1) + "%";
    document.getElementById('probBTTS').innerText = (pBTTS * 100).toFixed(1) + "%";
    document.getElementById('expG').innerText = (lambdaH + lambdaV).toFixed(2);
    
    document.getElementById('results').style.display = 'block';
    renderChart(matrixH, matrixV);
}

function renderChart(h, v) {
    const ctx = document.getElementById('goalsChart').getContext('2d');
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['0', '1', '2', '3', '4', '5'],
            datasets: [
                { label: 'Prob. Goles Local', data: h.slice(0,6), backgroundColor: '#4dabf7' },
                { label: 'Prob. Goles Visita', data: v.slice(0,6), backgroundColor: '#fcc419' }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { display: false } } }
    });
}
</script>
</body>
</html>
