<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BETAGS - Deep Analytics Pro</title>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-card: #151921;
            --primary: #4dabf7;
            --accent-green: #51cf66;
            --accent-red: #ff6b6b;
            --accent-yellow: #fcc419;
            --text-white: #e9ecef;
            --text-muted: #adb5bd;
            --border: #2c3440;
            --glass: rgba(255, 255, 255, 0.03);
            --row-select: rgba(77, 171, 247, 0.15); 
            --gold-glow: 0 0 15px rgba(252, 196, 25, 0.4);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-white);
            margin: 0;
            padding: 0;
            display: flex; 
            justify-content: center;
            min-height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 800px; 
            padding: 20px; 
            box-sizing: border-box;
            padding-bottom: 60px;
        }

        h1 { font-size: 1.6rem; color: var(--primary); text-align: center; margin: 25px 0; letter-spacing: 4px; font-weight: 900; }
        h1 span { color: var(--text-white); }

        .nav-header {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .btn-nav-roi, .btn-nav-xg {
            background: var(--glass);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 18px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-nav-xg { border-color: var(--accent-green); color: var(--accent-green); }
        .btn-nav-roi:hover { background: var(--primary); color: var(--bg-dark); }

        .section-title { 
            font-size: 0.75rem; 
            color: var(--primary); 
            text-transform: uppercase; 
            margin: 20px 0 12px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-weight: 800; 
            letter-spacing: 1px;
        }
        
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .input-grid { width: 100%; display: grid; grid-template-columns: 1fr; gap: 15px; }
        
        select, input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            background: #0b0e14;
            color: white;
            font-size: 0.9rem;
            outline: none;
            box-sizing: border-box;
        }

        .btn-analyze-master {
            width: 100%;
            background: linear-gradient(135deg, #4dabf7, #228be6);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(34, 139, 230, 0.4);
        }

        .probs-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .summary-box { 
            background: var(--glass);
            border-radius: 14px; 
            padding: 15px 5px; 
            text-align: center;
            border: 1px solid var(--border);
        }
        .summary-box.blue { border-top: 3px solid var(--primary); }
        .summary-box.green { border-top: 3px solid var(--accent-green); }
        .summary-box.yellow { border-top: 3px solid var(--accent-yellow); }

        .summary-val { font-size: 1.2rem; font-weight: 900; margin: 5px 0; }
        .summary-odds { font-size: 0.65rem; color: var(--accent-green); font-family: monospace; }

        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 14, 20, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #betToast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-green);
            color: var(--bg-dark);
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 0.8rem;
            display: none;
            z-index: 2000;
        }

        .team-box {
            padding: 15px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
        }
        .team-box.local { border-left: 4px solid var(--primary); }
        .team-box.away { border-left: 4px solid var(--accent-green); }
        .team-label { font-size: 0.7rem; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <p style="margin-top: 15px; font-weight: 800; color: var(--primary);">CARGANDO DATOS DE HOJA...</p>
</div>

<div id="betToast">🚀 ENVIADO A ROI2</div>

<div class="container">
    <h1>BETA<span>GS</span> PRO</h1>
    
    <div class="nav-header">
        <a href="roi2.html" class="btn-nav-roi"><span>🧮</span> ROI CALC</a>
        <a href="xg.html" class="btn-nav-xg"><span>⚽</span> XG ANALYTICS</a>
    </div>

    <div class="section-title"><span>🛠️</span> CALCULADORA INTELIGENTE (DELTA & POISSON)</div>
    <div class="card">
        
        <div style="margin-bottom: 15px;">
            <div style="font-size: 0.65rem; color: var(--text-muted); font-weight: 800; margin-bottom: 5px;">1. SELECCIONAR LIGA GUARDADA:</div>
            <select id="manual_league_select" onchange="cargarEquiposManual()"></select>
        </div>

        <div class="input-grid" style="grid-template-columns: repeat(2, 1fr); gap: 15px;">
            <div class="team-box local">
                <div class="team-label" style="color: var(--primary);">LOCAL</div>
                <select id="select_home_team" onchange="autoFillData('L')" style="margin-bottom: 10px; font-size: 0.75rem; padding: 10px;">
                    <option value="">- Equipo -</option>
                </select>
                <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                    <input type="number" id="calc_xg_l" placeholder="xG" step="0.01" style="padding: 8px; font-size: 0.8rem;">
                    <input type="number" id="calc_gf_l" placeholder="GF" step="0.01" style="padding: 8px; font-size: 0.8rem;">
                </div>
            </div>

            <div class="team-box away">
                <div class="team-label" style="color: var(--accent-green);">VISITA</div>
                <select id="select_away_team" onchange="autoFillData('V')" style="margin-bottom: 10px; font-size: 0.75rem; padding: 10px;">
                    <option value="">- Equipo -</option>
                </select>
                <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                    <input type="number" id="calc_xg_v" placeholder="xG" step="0.01" style="padding: 8px; font-size: 0.8rem;">
                    <input type="number" id="calc_gf_v" placeholder="GF" step="0.01" style="padding: 8px; font-size: 0.8rem;">
                </div>
            </div>
        </div>

        <button class="btn-analyze-master" onclick="calcularManual()" style="margin-top: 20px; background: linear-gradient(135deg, #51cf66, #2b8a3e);">
            🔥 CALCULAR ANALYTICS
        </button>
        
        <div id="manualResultPanel" style="display:none; margin-top:20px; padding-top:20px; border-top: 1px dotted var(--border);">
            <div style="display: flex; justify-content: space-around; text-align: center; margin-bottom: 15px;">
                <div>
                    <div style="font-size: 0.6rem; color: var(--text-muted);">DELTA L</div>
                    <div id="res_delta_l" style="font-size: 1.2rem; font-weight: 900;"></div>
                </div>
                <div>
                    <div style="font-size: 0.6rem; color: var(--text-muted);">TENDENCIA</div>
                    <div id="res_trend" style="font-size: 1.2rem;"></div>
                </div>
                <div>
                    <div style="font-size: 0.6rem; color: var(--text-muted);">DELTA V</div>
                    <div id="res_delta_v" style="font-size: 1.2rem; font-weight: 900;"></div>
                </div>
            </div>

            <div class="probs-summary">
                <div class="summary-box blue">
                    <div style="font-size: 0.55rem; font-weight: 800;">O2.5 FT</div>
                    <div class="summary-val" id="res_o25">0%</div>
                    <div class="summary-odds" id="res_o25_fair">1.00</div>
                </div>
                <div class="summary-box green">
                    <div style="font-size: 0.55rem; font-weight: 800;">BTTS YES</div>
                    <div class="summary-val" id="res_btts">0%</div>
                    <div class="summary-odds" id="res_btts_fair">1.00</div>
                </div>
                <div class="summary-box yellow">
                    <div style="font-size: 0.55rem; font-weight: 800;">O0.5 HT</div>
                    <div class="summary-val" id="res_o05ht">0%</div>
                    <div class="summary-odds" id="res_o05ht_fair">1.00</div>
                </div>
            </div>

            <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; border: 1px solid var(--border);">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <select id="manual_market_select" style="padding: 8px; font-size: 0.7rem; flex: 1;">
                        <option value="OVER 2.5 FT">OVER 2.5 FT</option>
                        <option value="BTTS YES">BTTS YES</option>
                        <option value="OVER 0.5 HT">OVER 0.5 HT</option>
                    </select>
                    <input type="number" id="manual_house_odd" placeholder="Cuota" step="0.01" style="padding: 8px; font-size: 0.7rem; width: 80px;">
                    <button onclick="enviarManualAROI()" class="btn-nav-xg" style="padding: 8px 15px;">ENVIAR</button>
                </div>
            </div>
        </div>
    </div>

    <div class="section-title"><span>⚙️</span> CONFIGURACIÓN DE LIGAS (SHEETS)</div>
    <div class="card">
        <div class="input-grid">
            <div style="display: flex; gap: 10px;">
                <select id="configLeagueSelect"></select>
                <button class="btn-nav-roi" onclick="borrarLigaConfig()" style="border-color: var(--accent-red); color: var(--accent-red);">🗑️</button>
            </div>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="newSheetName" placeholder="NOMBRE HOJA (PREMIER, LALIGA...)">
                <button class="btn-nav-xg" onclick="agregarLigaConfig()">+ AÑADIR</button>
            </div>
        </div>
    </div>
</div>

<script>
    const SHEETS_ID = '1lmUPv7SP0XYi9ns4jkj3RTCScxIN2pCfBJyMUp_kNRI';
    let database = { locales: {}, visitantes: {} }; 
    let currentManualData = {};

    // --- LÓGICA DE LIGAS (LocalStorage) ---
    function getSavedLeagues() {
        const saved = localStorage.getItem('betags_custom_leagues');
        return saved ? JSON.parse(saved) : [];
    }

    function updateLeagueSelectors() {
        const leagues = getSavedLeagues();
        const configSelect = document.getElementById('configLeagueSelect');
        const manualSelect = document.getElementById('manual_league_select');
        
        const options = leagues.length > 0 
            ? leagues.map(l => `<option value="${l.sheet}">${l.name}</option>`).join('')
            : '<option value="">SIN LIGAS</option>';
        
        configSelect.innerHTML = options;
        manualSelect.innerHTML = '<option value="">- Selecciona Liga -</option>' + options;
    }

    function agregarLigaConfig() {
        const name = document.getElementById('newSheetName').value.trim().toUpperCase();
        if (!name) return;
        const leagues = getSavedLeagues();
        if (leagues.some(l => l.sheet === name)) return;
        leagues.push({name, sheet: name});
        localStorage.setItem('betags_custom_leagues', JSON.stringify(leagues));
        document.getElementById('newSheetName').value = "";
        updateLeagueSelectors();
    }

    function borrarLigaConfig() {
        const val = document.getElementById('configLeagueSelect').value;
        if(!val) return;
        let leagues = getSavedLeagues().filter(l => l.sheet !== val);
        localStorage.setItem('betags_custom_leagues', JSON.stringify(leagues));
        updateLeagueSelectors();
    }

    // --- CARGA DE DATOS DE EQUIPOS ---
    async function cargarEquiposManual() {
        const sheetName = document.getElementById('manual_league_select').value;
        if (!sheetName) return;

        document.getElementById('loadingOverlay').style.display = 'flex';
        
        const url = `https://docs.google.com/spreadsheets/d/${SHEETS_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&range=A1:W60`;
        
        try {
            const res = await fetch(url);
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
            
            database = { locales: {}, visitantes: {} };
            
            rows.forEach((cols, i) => {
                if (i > 0 && cols[1] && !isNaN(parseFloat(cols[2]))) {
                    const nameH = cols[1].toUpperCase();
                    const nameA = cols[13].toUpperCase();
                    
                    // Basado en tus columnas: GP Local (cols[2]), GF Local (cols[6])
                    // GP Visita (cols[14]), GF Visita (cols[18])
                    const gpL = parseFloat(cols[2]) || 1;
                    const gpV = parseFloat(cols[14]) || 1;

                    database.locales[nameH] = {
                        xg: (parseFloat(cols[2])/gpL).toFixed(2), // Simplificamos xG como promedio si no hay columna xG específica
                        gf: (parseFloat(cols[6])/gpL).toFixed(2)
                    };
                    database.visitantes[nameA] = {
                        xg: (parseFloat(cols[18])/gpV).toFixed(2),
                        gf: (parseFloat(cols[18])/gpV).toFixed(2) // Ajustar según tus columnas reales de xG si existen
                    };
                }
            });

            const homeSelect = document.getElementById('select_home_team');
            const awaySelect = document.getElementById('select_away_team');
            
            const homeHtml = Object.keys(database.locales).sort().map(n => `<option value="${n}">${n}</option>`).join('');
            const awayHtml = Object.keys(database.visitantes).sort().map(n => `<option value="${n}">${n}</option>`).join('');
            
            homeSelect.innerHTML = '<option value="">- Equipo -</option>' + homeHtml;
            awaySelect.innerHTML = '<option value="">- Equipo -</option>' + awayHtml;

        } catch (e) {
            alert("Error al cargar datos de la hoja.");
        } finally {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    }

    function autoFillData(side) {
        if (side === 'L') {
            const team = document.getElementById('select_home_team').value;
            if (database.locales[team]) {
                document.getElementById('calc_xg_l').value = database.locales[team].xg;
                document.getElementById('calc_gf_l').value = database.locales[team].gf;
            }
        } else {
            const team = document.getElementById('select_away_team').value;
            if (database.visitantes[team]) {
                document.getElementById('calc_xg_v').value = database.visitantes[team].xg;
                document.getElementById('calc_gf_v').value = database.visitantes[team].gf;
            }
        }
    }

    // --- CÁLCULO MATEMÁTICO ---
    function poisson(k, lambda) {
        if(lambda <= 0) return k === 0 ? 1 : 0;
        return (Math.exp(-lambda) * Math.pow(lambda, k)) / factorial(k);
    }
    function factorial(n) { let r = 1; for (let i = 2; i <= n; i++) r *= i; return r; }

    function logisticAdjustment(poissonProb, xGL, xGV, market) {
        let b0 = market === 'ov25' ? -2.85 : -1.95;
        let b1 = market === 'ov25' ? 0.65 : 0.45;
        let b2 = market === 'ov25' ? 3.5 : 2.8;
        const logit = b0 + (b1 * (xGL + xGV)) + (b2 * poissonProb);
        const prob = 1 / (1 + Math.exp(-logit));
        return (poissonProb * 0.4) + (prob * 0.6);
    }

    function calcularManual() {
        const xGL = parseFloat(document.getElementById('calc_xg_l').value);
        const GFL = parseFloat(document.getElementById('calc_gf_l').value);
        const xGV = parseFloat(document.getElementById('calc_xg_v').value);
        const GFV = parseFloat(document.getElementById('calc_gf_v').value);

        if(isNaN(xGL) || isNaN(GFL) || isNaN(xGV) || isNaN(GFV)) return alert("Completa los promedios.");

        const deltaL = GFL - xGL;
        const deltaV = GFV - xGV;

        document.getElementById('res_delta_l').innerText = deltaL.toFixed(2);
        document.getElementById('res_delta_v').innerText = deltaV.toFixed(2);
        document.getElementById('res_delta_l').style.color = deltaL > 0.3 ? 'var(--accent-red)' : (deltaL < -0.3 ? 'var(--accent-green)' : 'white');
        document.getElementById('res_delta_v').style.color = deltaV > 0.3 ? 'var(--accent-red)' : (deltaV < -0.3 ? 'var(--accent-green)' : 'white');
        
        document.getElementById('res_trend').innerHTML = (deltaL > 0.3 ? '🚀' : (deltaL < -0.3 ? '📉' : '🎯')) + ' ' + (deltaV > 0.3 ? '🚀' : (deltaV < -0.3 ? '📉' : '🎯'));

        let u25 = 0;
        let pL = [], pV = [];
        for(let i=0; i<=6; i++){ pL[i]=poisson(i, xGL); pV[i]=poisson(i, xGV); }
        for(let i=0; i<=6; i++) for(let j=0; j<=6; j++) if(i+j <= 2) u25 += pL[i]*pV[j];
        
        const probO25 = logisticAdjustment(1 - u25, xGL, xGV, 'ov25');
        const probBTTS = logisticAdjustment(1 - (pL[0] + pV[0] - (pL[0]*pV[0])), xGL, xGV, 'btts');
        const probHT = 1 - Math.exp(-(xGL + xGV) * 0.45);

        document.getElementById('res_o25').innerText = (probO25 * 100).toFixed(0) + '%';
        document.getElementById('res_o25_fair').innerText = (1/probO25).toFixed(2);
        document.getElementById('res_btts').innerText = (probBTTS * 100).toFixed(0) + '%';
        document.getElementById('res_btts_fair').innerText = (1/probBTTS).toFixed(2);
        document.getElementById('res_o05ht').innerText = (probHT * 100).toFixed(0) + '%';
        document.getElementById('res_o05ht_fair').innerText = (1/probHT).toFixed(2);

        currentManualData = { o25: probO25, btts: probBTTS, o05ht: probHT };
        document.getElementById('manualResultPanel').style.display = 'block';
    }

    function enviarManualAROI() {
        const home = document.getElementById('select_home_team').value || "Local";
        const away = document.getElementById('select_away_team').value || "Visita";
        const market = document.getElementById('manual_market_select').value;
        const odd = parseFloat(document.getElementById('manual_house_odd').value);
        
        if(!odd || odd <= 1) return alert("Ingresa cuota.");

        let prob = currentManualData.o25;
        if(market === 'BTTS YES') prob = currentManualData.btts;
        if(market === 'OVER 0.5 HT') prob = currentManualData.o05ht;

        const pick = {
            id: Date.now(),
            date: new Date().toLocaleString(),
            teams: `[MANUAL] ${home} vs ${away}`,
            market: market,
            prob: prob,
            fair_odd: (1/prob).toFixed(2),
            odd: odd,
            edge: ((prob * odd - 1) * 100).toFixed(1) + '%',
            stake: 1,
            status: 'pending'
        };

        let historial = JSON.parse(localStorage.getItem('betags_pre_match')) || [];
        historial.push(pick);
        localStorage.setItem('betags_pre_match', JSON.stringify(historial));

        document.getElementById('betToast').style.display = 'block';
        setTimeout(() => { document.getElementById('betToast').style.display = 'none'; }, 2500);
    }

    window.onload = updateLeagueSelectors;
</script>
</body>
</html>
