<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Poisson Pro - xG Delta</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #1e293b;
            --accent: #10b981;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--secondary);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
        }

        button {
            grid-column: 1 / -1;
            background-color: var(--primary);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .card {
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            color: white;
        }

        .over { background-color: #059669; }
        .under { background-color: #dc2626; }
        .btts { background-color: #7c3aed; }

        .card h3 { margin: 0 0 10px 0; font-size: 0.9rem; text-transform: uppercase; }
        .card p { margin: 0; font-size: 1.8rem; font-weight: bold; }

        .info-panel {
            margin-top: 20px;
            padding: 15px;
            background: #f1f5f9;
            border-left: 4px solid var(--primary);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Análisis Poisson xG Delta</h1>

    <div class="grid-inputs">
        <div class="input-group">
            <label>Liga</label>
            <input type="text" id="liga" placeholder="Ej: La Liga">
        </div>
        <div class="input-group">
            <label>Equipo Local</label>
            <input type="text" id="local" placeholder="Local">
        </div>
        <div class="input-group">
            <label>Equipo Visita</label>
            <input type="text" id="visita" placeholder="Visita">
        </div>

        <div class="input-group">
            <label>xG Local (Promedio)</label>
            <input type="number" id="xgLocal" step="0.01" value="1.50">
        </div>
        <div class="input-group">
            <label>GF Local (Promedio)</label>
            <input type="number" id="gfLocal" step="0.01" value="1.40">
        </div>

        <div class="input-group">
            <label>xG Visita (Promedio)</label>
            <input type="number" id="xgVisita" step="0.01" value="1.20">
        </div>
        <div class="input-group">
            <label>GF Visita (Promedio)</label>
            <input type="number" id="gfVisita" step="0.01" value="1.10">
        </div>

        <button onclick="calcular()">Calcular Probabilidades</button>
    </div>

    <div id="display-info" style="text-align: center; font-weight: bold; margin-bottom: 10px;"></div>

    <div class="results-grid">
        <div class="card over">
            <h3>Over 2.5 FT</h3>
            <p id="over25">-</p>
        </div>
        <div class="card under">
            <h3>Under 2.5 FT</h3>
            <p id="under25">-</p>
        </div>
        <div class="card btts">
            <h3>BTTS Yes</h3>
            <p id="bttsYes">-</p>
        </div>
        <div class="card btts" style="background-color: #4b5563;">
            <h3>BTTS No</h3>
            <p id="bttsNo">-</p>
        </div>
    </div>

    <div class="info-panel">
        <strong>Lógica Delta xG:</strong> Esta herramienta calcula el promedio entre los Goles Reales (GF) y los Goles Esperados (xG) para obtener una "Expectativa Realista" de goles por equipo antes de aplicar la distribución de Poisson.
    </div>
</div>

<script>
    // Función de distribución de Poisson
    function poisson(k, lambda) {
        return (Math.exp(-lambda) * Math.pow(lambda, k)) / factorial(k);
    }

    function factorial(n) {
        if (n === 0 || n === 1) return 1;
        let res = 1;
        for (let i = 2; i <= n; i++) res *= i;
        return res;
    }

    function calcular() {
        // Obtener valores
        const xgL = parseFloat(document.getElementById('xgLocal').value);
        const gfL = parseFloat(document.getElementById('gfLocal').value);
        const xgV = parseFloat(document.getElementById('xgVisita').value);
        const gfV = parseFloat(document.getElementById('gfVisita').value);
        
        const nombreL = document.getElementById('local').value || "Local";
        const nombreV = document.getElementById('visita').value || "Visita";
        const liga = document.getElementById('liga').value || "General";

        // Aplicar Delta xG: Promedio entre lo que debió marcar (xG) y lo que marcó (GF)
        const lambdaL = (xgL + gfL) / 2;
        const lambdaV = (xgV + gfV) / 2;

        let probUnder25 = 0;
        let probL0 = poisson(0, lambdaL);
        let probV0 = poisson(0, lambdaV);
        
        // Matrices de probabilidad para marcador exacto (hasta 10 goles)
        let matrix = [];
        for (let i = 0; i <= 10; i++) {
            matrix[i] = [];
            for (let j = 0; j <= 10; j++) {
                let pL = poisson(i, lambdaL);
                let pV = poisson(j, lambdaV);
                let pScore = pL * pV;
                matrix[i][j] = pScore;

                // Sumar para Under 2.5 (Marcadores: 0-0, 1-0, 0-1, 1-1, 2-0, 0-2)
                if (i + j < 2.5) {
                    probUnder25 += pScore;
                }
            }
        }

        // Cálculos Finales
        const pOver25 = (1 - probUnder25) * 100;
        const pUnder25 = probUnder25 * 100;

        // BTTS NO: Algún equipo marca 0 goles
        // P(BTTS NO) = P(Local 0) + P(Visita 0) - P(Ambos 0)
        const pBTTS_No = (probL0 + probV0 - (probL0 * probV0)) * 100;
        const pBTTS_Yes = 100 - pBTTS_No;

        // Mostrar Resultados
        document.getElementById('display-info').innerText = `${liga}: ${nombreL} vs ${nombreV}`;
        document.getElementById('over25').innerText = pOver25.toFixed(2) + "%";
        document.getElementById('under25').innerText = pUnder25.toFixed(2) + "%";
        document.getElementById('bttsYes').innerText = pBTTS_Yes.toFixed(2) + "%";
        document.getElementById('bttsNo').innerText = pBTTS_No.toFixed(2) + "%";
    }
</script>

</body>
</html>
